<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>4D클린 현장 일지 (Master)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <style>
      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --danger: #ef4444;
        --bg-main: #f8fafc;
        --bg-container: #ffffff;
        --bg-card: #f1f5f9;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
        --input-bg: #ffffff;
        --weather-available: #facc15; 
      }
      body.dark-mode {
        --bg-main: #0f172a;
        --bg-container: #1e293b;
        --bg-card: #334155;
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
        --border-color: #475569;
        --input-bg: #1e293b;
      }
      body { font-family: sans-serif; background: var(--bg-main); margin: 0; padding: 10px; padding-bottom: 80px; color: var(--text-main); transition: all 0.3s ease; }
      .container { max-width: 600px; margin: 0 auto; background: var(--bg-container); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
      .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
      .tab-btn { flex: 1; padding: 12px; border: none; background: var(--bg-card); color: var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: bold; }
      .tab-btn.active { background: var(--primary); color: white; }
      .card { border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; background: var(--bg-container); }
      .card h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px; }
      label { display: block; font-size: 0.8rem; font-weight: bold; color: var(--text-muted); margin-bottom: 4px; }
      input, select, textarea { width: 100%; padding: 10px 8px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-main); margin-top: 4px; box-sizing: border-box; font-size: 0.95rem; }
      .time-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
      .time-box { background: var(--bg-card); padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border-color); }
      .time-box select { flex: 1; padding: 8px 4px; font-size: 0.85rem; min-width: 0; text-align: center; }
      .bottom-fixed-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px; background: var(--bg-container); border-top: 1px solid var(--border-color); display: flex; justify-content: center; z-index: 100; }
      .save-work-btn-large { width: 100%; max-width: 600px; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
      
      .loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white; backdrop-filter: blur(5px); }
      .progress-container { width: 85%; max-width: 350px; background: #334155; height: 12px; border-radius: 6px; margin-top: 25px; overflow: hidden; }
      .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary), #818cf8); transition: width 0.4s ease; border-radius: 6px; }
      .spinner { width: 50px; height: 50px; border: 5px solid #334155; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .detail-log { font-size: 0.8rem; color: #94a3b8; margin-top: 8px; text-align: center; }
      
      .checklist-item { display: flex; align-items: center; gap: 10px; background: var(--bg-card); padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border-color); }
      .checklist-item input[type="checkbox"] { width: 22px; height: 22px; flex-shrink: 0; }
      .checklist-item span { flex: 1; font-size: 0.9rem; }
      .btn-del-item { color: var(--danger); background: none; border: 1px solid var(--danger); padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; }
      .btn-expand { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px; border-radius: 5px; font-size: 0.75rem; width: 100%; margin-top: 8px; cursor: pointer; }
      .weather-badge { font-size: 0.8rem; color: #fff; margin-bottom: 12px; background: var(--primary); padding: 6px 12px; border-radius: 6px; display: inline-block; font-weight: bold; }
      .extra-photo-row { background: var(--bg-card); padding: 12px; border-radius: 10px; border: 1px dashed var(--border-color); margin-bottom: 10px; }
      .photo-btn-label { display: block; width: 100%; padding: 12px; background: var(--primary); color: white; text-align: center; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 8px; }
      .photo-btn-label.disabled { background: var(--text-muted); opacity: 0.5; cursor: not-allowed; }

      .dark-mode .flatpickr-calendar { background: #1e293b !important; border: 1px solid #475569 !important; }
      .dark-mode span.flatpickr-day { color: #ffffff !important; }
      .dark-mode span.flatpickr-day.flatpickr-disabled, 
      .dark-mode span.flatpickr-day.prevMonthDay, 
      .dark-mode span.flatpickr-day.nextMonthDay { color: #64748b !important; }
      .dark-mode .flatpickr-months .flatpickr-month,
      .dark-mode .flatpickr-current-month,
      .dark-mode .flatpickr-current-month .flatpickr-monthDropdown-months,
      .dark-mode .flatpickr-current-month input.cur-year,
      .dark-mode span.flatpickr-weekday,
      .dark-mode .flatpickr-months .flatpickr-prev-month,
      .dark-mode .flatpickr-months .flatpickr-next-month { color: #ffffff !important; fill: #ffffff !important; }
      .dark-mode .flatpickr-current-month .flatpickr-monthDropdown-months option { background: #1e293b !important; color: #ffffff !important; }

      html body span.flatpickr-day.weather-available,
      html body.dark-mode span.flatpickr-day.weather-available { color: var(--weather-available) !important; font-weight: 900 !important; text-shadow: none !important; }
      html body span.flatpickr-day.selected.weather-available,
      html body.dark-mode span.flatpickr-day.selected.weather-available { color: #1e293b !important; background: var(--weather-available) !important; border-color: var(--weather-available) !important; }
    </style>
  </head>
  <body class="dark-mode">
    <main class="container">
      <div class="app-header">
        <h1 style="font-size: 1.3rem; margin:0;">4D클린 현장 일지</h1>
        <button id="themeToggleBtn" type="button" style="background:none; border:none; font-size: 1.5rem; cursor:pointer;">☀️</button>
      </div>

      <div class="tabs" style="display:flex; gap:8px; margin-bottom:15px;">
        <button class="tab-btn active" data-tab="main" onclick="switchTab('main')">작업 기록</button>
        <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">규칙 설정</button>
      </div>

      <div id="main-tab" class="tab-content active">
        <section class="card">
          <h2>1) 작업 기본 정보</h2>
          <div id="weatherInfoText" class="weather-badge">📍 날씨 데이터 연동 중...</div>
          <div style="font-size: 10px; color: var(--weather-available); margin-bottom: 10px; font-weight: bold;">* 노란색 날짜: 과거/미래 날씨 조회가 가능한 날 (클릭 시 자동 조회)</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <label>작업 날짜 <input id="workDate" type="text" placeholder="날짜 선택"></label>
            <label>현장 작업자 <select id="workerName"><option value="이영준">이영준</option><option value="조혜진">조혜진</option></select></label>
          </div>
          <label style="margin-top:10px;">대상 건물 <select id="buildingSelect" onchange="updateChecklist()"><option value="백산빌딩">백산빌딩</option><option value="효성빌딩">효성빌딩</option></select></label>
          
          <div class="time-select-grid">
            <div class="time-box">
              <label>시작 시간</label>
              <div style="display:flex; gap:4px; margin-top:5px;">
                <select id="startHour" onchange="syncEndTime()"></select>
                <select id="startMin" onchange="syncEndTime()"><option value="00">00분</option><option value="30">30분</option></select>
              </div>
            </div>
            <div class="time-box">
              <label>종료 시간</label>
              <div style="display:flex; gap:4px; margin-top:5px;">
                <select id="endHour"></select>
                <select id="endMin"><option value="00">00분</option><option value="30">30분</option></select>
              </div>
            </div>
          </div>
          <button type="button" id="btnExpandTime" class="btn-expand">시간 확장 (00~23시)</button>
        </section>

        <section class="card">
          <h2 style="border-bottom:none; margin-bottom:4px;">2) 오늘의 청소 체크리스트</h2>
          <ul id="checklistItems" style="list-style:none; padding:0;"></ul>
          <div style="display:flex; gap:6px; margin-top:10px; align-items: center;">
            <input type="text" id="customItemInput" placeholder="현장 추가 항목" style="margin:0; flex: 1; min-width: 0;">
            <button id="addCustomItemBtn" type="button" style="background:var(--primary); color:white; border:none; padding:0 15px; height: 42px; border-radius:6px; font-weight:bold;">추가</button>
          </div>
        </section>

        <section class="card">
          <h2>3) 사진 및 환경 데이터</h2>
          <!-- [수정사항] 불필요한 OCR 안내 문구 전면 삭제 완료 -->
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;">
             <label>내부 온도 <select id="interiorTemp"></select></label>
             <label>내부 습도 <select id="interiorHumidity"></select></label>
          </div>
          <input id="photoThermometer" type="file" accept="image/*" capture="environment" style="display:none;">
          <button type="button" onclick="document.getElementById('photoThermometer').click()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;">📸 온습도계 사진 촬영</button>
          <div id="fieldPhotos"></div>
          <button id="addFieldPhotoBtn" type="button" style="width:100%; padding:12px; background:#10b981; color:white; border:none; border-radius:8px; font-weight:bold;">+ 작업 사진 추가</button>
        </section>

        <section class="card">
          <h2>4) 마무리 기록</h2>
          <label>고객 요청사항 <textarea id="customerRequest" rows="2" placeholder="전달사항 입력"></textarea></label>
          <label style="margin-top:10px;">작업자 메모 <textarea id="workMemo" rows="2" placeholder="특이사항"></textarea></label>
        </section>
      </div>

      <div id="settings-tab" class="tab-content" style="display:none;">
        <section class="card">
          <h2 style="color:var(--primary);">규칙 관리</h2>
          <div id="rulesAdminContainer">
            <h3 style="font-size:0.9rem;">기본 규칙</h3><div id="defaultRulesList"></div>
            <button type="button" onclick="addRuleRow('default')" style="width:100%; padding:10px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:6px; margin-bottom:15px; color:var(--text-main);">+ 기본 규칙 추가</button>
            <h3 style="font-size:0.9rem;">월정기 규칙</h3><div id="monthlyRulesList"></div>
            <button type="button" onclick="addRuleRow('monthly')" style="width:100%; padding:10px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:6px; margin-bottom:15px; color:var(--text-main);">+ 월정기 규칙 추가</button>
            <h3 style="font-size:0.9rem;">이벤트 규칙</h3><div id="eventRulesList"></div>
            <button type="button" onclick="addRuleRow('event')" style="width:100%; padding:10px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:6px; margin-bottom:15px; color:var(--text-main);">+ 고객요청 규칙 추가</button>
          </div>
          <button id="saveRulesToServerBtn" type="button" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:10
