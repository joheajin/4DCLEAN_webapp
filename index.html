<!-- 중략된 스타일 및 상단 구조는 동일, 핵심 Script 영역만 교체하세요 -->
<script>
  // ... (초기화 및 날씨 로직 생략) ...

  document.getElementById('saveWorkBtn').onclick = async () => {
    const loadingOverlay = document.getElementById('loadingOverlay');
    loadingOverlay.style.display = 'flex';

    // [리스크팀 제안] 타임아웃 타이머 설정 (30초 후 강제 종료)
    const timeoutPromise = new Promise((_, reject) => 
      setTimeout(() => reject(new Error("시간 초과")), 30000)
    );

    const toB64 = f => new Promise(r => { 
      const reader = new FileReader(); 
      reader.onload = () => r(reader.result.split(',')[1]); 
      reader.readAsDataURL(f); 
    });
    
    try {
      const payload = {
        // ... (이전과 동일한 페이로드 구성) ...
        workDate: document.getElementById('workDate').value,
        building: document.getElementById('buildingSelect').value,
        worker: document.getElementById('workerName').value,
        weather: document.getElementById('weatherInfoText').innerText,
        interiorTemp: document.getElementById('interiorTemp').value,
        interiorHumid: document.getElementById('interiorHumidity').value,
        customerReq: document.getElementById('customerRequest').value,
        workMemo: document.getElementById('workMemo').value,
        yearMonthFolder: document.getElementById('workDate').value.substring(0,7).replace('-',''),
        checklist: Array.from(document.querySelectorAll('#checklistItems li')).map(li => ({
          item: li.querySelector('span').innerText,
          checked: li.querySelector('input').checked ? "O" : "X"
        })),
        photos: []
      };

      const thFile = document.getElementById('photoThermometer').files[0];
      if(thFile) payload.photos.push({ fileName: `${payload.workDate.replace(/-/g,'')}_내부온습도.JPG`, data: await toB64(thFile) });

      // [기술팀 보완] 타임아웃과 fetch를 경쟁시켜 먼저 끝나는 쪽을 따름
      await Promise.race([
        fetch(APP_SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(payload) }),
        timeoutPromise
      ]);

      alert("✅ 전송 시도 완료! (구글 시트를 잠시 후 확인하세요)");
      location.reload();

    } catch (e) {
      console.error(e);
      if(e.message === "시간 초과") {
        alert("⚠️ 전송이 지연되고 있습니다. 시트에서 기록을 확인하신 후, 중복 전송에 주의하세요.");
      } else {
        alert("❌ 전송 에러 발생: " + e.message);
      }
    } finally {
      loadingOverlay.style.display = 'none';
    }
  };
</script>
