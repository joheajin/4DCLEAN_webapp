<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>4D클린 현장 일지 (Master)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <style>
      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --danger: #ef4444;
        --bg-main: #f8fafc;
        --bg-container: #ffffff;
        --bg-card: #f1f5f9;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
        --input-bg: #ffffff;
        --weather-available: #facc15; 
      }
      body.dark-mode {
        --bg-main: #0f172a;
        --bg-container: #1e293b;
        --bg-card: #334155;
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
        --border-color: #475569;
        --input-bg: #1e293b;
      }
      body { font-family: sans-serif; background: var(--bg-main); margin: 0; padding: 10px; padding-bottom: 80px; color: var(--text-main); transition: all 0.3s ease; }
      .container { max-width: 600px; margin: 0 auto; background: var(--bg-container); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
      .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
      .tab-btn { flex: 1; padding: 12px; border: none; background: var(--bg-card); color: var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: bold; }
      .tab-btn.active { background: var(--primary); color: white; }
      .card { border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; background: var(--bg-container); }
      .card h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px; }
      label { display: block; font-size: 0.8rem; font-weight: bold; color: var(--text-muted); margin-bottom: 4px; }
      input, select, textarea { width: 100%; padding: 10px 8px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-main); margin-top: 4px; box-sizing: border-box; font-size: 0.95rem; }
      .time-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
      .time-box { background: var(--bg-card); padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border-color); }
      .time-box select { flex: 1; padding: 8px 4px; font-size: 0.85rem; min-width: 0; text-align: center; }
      .bottom-fixed-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px; background: var(--bg-container); border-top: 1px solid var(--border-color); display: flex; justify-content: center; z-index: 100; }
      .save-work-btn-large { width: 100%; max-width: 600px; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
      
      .loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white; backdrop-filter: blur(5px); }
      .progress-container { width: 85%; max-width: 350px; background: #334155; height: 12px; border-radius: 6px; margin-top: 25px; overflow: hidden; }
      .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary), #818cf8); transition: width 0.4s ease; border-radius: 6px; }
      .spinner { width: 50px; height: 50px; border: 5px solid #334155; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .detail-log { font-size: 0.8rem; color: #94a3b8; margin-top: 8px; text-align: center; }
      
      .checklist-item { display: flex; align-items: center; gap: 10px; background: var(--bg-card); padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border-color); }
      .checklist-item input[type="checkbox"] { width: 22px; height: 22px; flex-shrink: 0; }
      .checklist-item span { flex: 1; font-size: 0.9rem; }
      .btn-del-item { color: var(--danger); background: none; border: 1px solid var(--danger); padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; }
      .btn-expand { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px; border-radius: 5px; font-size: 0.75rem; width: 100%; margin-top: 8px; cursor: pointer; }
      .weather-badge { font-size: 0.8rem; color: #fff; margin-bottom: 12px; background: var(--primary); padding: 6px 12px; border-radius: 6px; display: inline-block; font-weight: bold; }
      .extra-photo-row { background: var(--bg-card); padding: 12px; border-radius: 10px; border: 1px dashed var(--border-color); margin-bottom: 10px; }
      .photo-btn-label { display: block; width: 100%; padding: 12px; background: var(--primary); color: white; text-align: center; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 8px; }
      .photo-btn-label.disabled { background: var(--text-muted); opacity: 0.5; cursor: not-allowed; }

      /* ==========================================
         [핵심 수정] 달력 날짜 색상 우선순위 극대화
         ========================================== */
      .dark-mode .flatpickr-calendar { background: #1e293b !important; border: 1px solid #475569 !important; }
      .dark-mode span.flatpickr-day { color: #ffffff !important; }
      .dark-mode span.flatpickr-day.flatpickr-disabled, 
      .dark-mode span.flatpickr-day.prevMonthDay, 
      .dark-mode span.flatpickr-day.nextMonthDay { color: #64748b !important; }

      /* 날씨 가능한 날짜 (무조건 노란색 고정, 다른 속성보다 최상위 우선) */
      html body span.flatpickr-day.weather-available,
      html body.dark-mode span.flatpickr-day.weather-available { 
        color: var(--weather-available) !important; 
        font-weight: 900 !important; 
        text-shadow: none !important; 
      }
      
      /* 선택된 날씨 가능한 날짜 */
      html body span.flatpickr-day.selected.weather-available,
      html body.dark-mode span.flatpickr-day.selected.weather-available { 
        color: #1e293b !important; 
        background: var(--weather-available) !important; 
        border-color: var(--weather-available) !important; 
      }
    </style>
  </head>
  <body class="dark-mode">
    <main class="container">
      <div class="app-header">
        <h1 style="font-size: 1.3rem; margin:0;">4D클린 현장 일지</h1>
        <!-- 다크모드 토글 버튼 정상화 -->
        <button id="themeToggleBtn" type="button" style="background:none; border:none; font-size: 1.5rem; cursor:pointer;">☀️</button>
      </div>

      <div class="tabs" style="display:flex; gap:8px; margin-bottom:15px;">
        <button class="tab-btn active" data-tab="main" onclick="switchTab('main')">작업 기록</button>
        <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">규칙 설정</button>
      </div>

      <div id="main-tab" class="tab-content active">
        <section class="card">
          <h2>1) 작업 기본 정보</h2>
          <div id="weatherInfoText" class="weather-badge">📍 날씨 데이터 연동 중...</div>
          <div style="font-size: 10px; color: var(--weather-available); margin-bottom: 10px; font-weight: bold;">* 노란색 날짜: 과거/미래 날씨 조회가 가능한 날 (클릭 시 자동 조회)</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <label>작업 날짜 <input id="workDate" type="text" placeholder="날짜 선택"></label>
            <label>현장 작업자 <select id="workerName"><option value="이영준">이영준</option><option value="조혜진">조혜진</option></select></label>
          </div>
          <label style="margin-top:10px;">대상 건물 <select id="buildingSelect" onchange="updateChecklist()"><option value="백산빌딩">백산빌딩</option><option value="효성빌딩">효성빌딩</option></select></label>
          
          <div class="time-select-grid">
            <div class="time-box">
              <label>시작 시간</label>
              <div style="display:flex; gap:4px; margin-top:5px;">
                <select id="startHour" onchange="syncEndTime()"></select>
                <select id="startMin" onchange="syncEndTime()"><option value="00">00분</option><option value="30">30분</option></select>
              </div>
            </div>
            <div class="time-box">
              <label>종료 시간</label>
              <div style="display:flex; gap:4px; margin-top:5px;">
                <select id="endHour"></select>
                <select id="endMin"><option value="00">00분</option><option value="30">30분</option></select>
              </div>
            </div>
          </div>
          <button type="button" id="btnExpandTime" class="btn-expand">시간 확장 (00~23시)</button>
        </section>

        <section class="card">
          <h2 style="border-bottom:none; margin-bottom:4px;">2) 오늘의 청소 체크리스트</h2>
          <ul id="checklistItems" style="list-style:none; padding:0;"></ul>
          <div style="display:flex; gap:6px; margin-top:10px; align-items: center;">
            <input type="text" id="customItemInput" placeholder="현장 추가 항목" style="margin:0; flex: 1; min-width: 0;">
            <!-- 추가 버튼 정상화 -->
            <button id="addCustomItemBtn" type="button" style="background:var(--primary); color:white; border:none; padding:0 15px; height: 42px; border-radius:6px; font-weight:bold;">추가</button>
          </div>
        </section>

        <section class="card">
          <h2>3) 사진 및 환경 데이터</h2>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;">
             <label>내부 온도 <select id="interiorTemp"></select></label>
             <label>내부 습도 <select id="interiorHumidity"></select></label>
          </div>
          <input id="photoThermometer" type="file" accept="image/*" capture="environment" style="display:none;">
          <button type="button" onclick="document.getElementById('photoThermometer').click()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;">📸 온습도계 사진 촬영</button>
          <div id="fieldPhotos"></div>
          <!-- 사진 추가 버튼 정상화 -->
          <button id="addFieldPhotoBtn" type="button" style="width:100%; padding:12px; background:#10b981; color:white; border:none; border-radius:8px; font-weight:bold;">+ 작업 사진 추가</button>
        </section>

        <section class="card">
          <h2>4) 마무리 기록</h2>
          <label>고객 요청사항 <textarea id="customerRequest" rows="2" placeholder="전달사항 입력"></textarea></label>
          <label style="margin-top:10px;">작업자 메모 <textarea id="workMemo" rows="2" placeholder="특이사항"></textarea></label>
        </section>
      </div>

      <div id="settings-tab" class="tab-content" style="display:none;">
        <section class="card">
          <h2 style="color:var(--primary);">규칙 관리</h2>
          <div id="rulesAdminContainer">
            <h3 style="font-size:0.9rem;">기본 규칙</h3><div id="defaultRulesList"></div>
            <button type="button" onclick="addRuleRow('default')" style="width:100%; padding:10px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:6px; margin-bottom:15px; color:var(--text-main);">+ 기본 규칙 추가</button>
            <h3 style="font-size:0.9rem;">월정기 규칙</h3><div id="monthlyRulesList"></div>
            <button type="button" onclick="addRuleRow('monthly')" style="width:100%; padding:10px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:6px; margin-bottom:15px; color:var(--text-main);">+ 월정기 규칙 추가</button>
            <h3 style="font-size:0.9rem;">이벤트 규칙</h3><div id="eventRulesList"></div>
            <button type="button" onclick="addRuleRow('event')" style="width:100%; padding:10px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:6px; margin-bottom:15px; color:var(--text-main);">+ 고객요청 규칙 추가</button>
          </div>
          <button id="saveRulesToServerBtn" type="button" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:10px; margin-top:20px; font-weight:bold;">🌐 서버에 규칙 저장</button>
        </section>
      </div>
    </main>

    <div class="bottom-fixed-bar">
      <button id="saveWorkBtn" class="save-work-btn-large">작업 일지 서버 전송</button>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
      <div class="spinner"></div>
      <p id="loadingTitle" style="margin-top:20px; font-weight:bold; font-size: 1.2rem;">데이터 전송 시작</p>
      <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
      <p id="progressStatus" style="margin-top: 12px; font-size: 0.95rem; color: #818cf8; font-weight: bold;">준비 중...</p>
      <p id="detailLog" class="detail-log"></p>
    </div>

    <script>
      const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgkKi6qzWkd4ZBM1xECxtgdO80ynvIaUb5C3YoQQ6z7Ae_qN6hb1WnYXBircD5QThJDw/exec";
      let globalRules = JSON.parse(localStorage.getItem('4d_rules_cache')) || { defaultRules: [], monthlyRules: [], eventRules: [] };
      let extraPhotoCount = 0;
      let isExpanded = false;

      // ==========================================
      // [1] 앱 초기화 및 다크모드/달력 렌더링 정상화
      // ==========================================
      window.onload = async () => {
        initTimeOptions();
        initSelects();
        
        // 과거 30일 ~ 미래 14일 계산 (달력 노란색 표시용)
        const todayObj = new Date();
        todayObj.setHours(0,0,0,0);
        const minWeatherDate = new Date(todayObj); minWeatherDate.setDate(todayObj.getDate() - 30);
        const maxWeatherDate = new Date(todayObj); maxWeatherDate.setDate(todayObj.getDate() + 14);

        flatpickr("#workDate", { 
          locale: "ko", 
          defaultDate: "today", 
          disableMobile: true,
          onDayCreate: function(dObj, dStr, fp, dayElem) {
            // 과거~미래 구간에 정확하게 weather-available 클래스 주입
            if (dayElem.dateObj >= minWeatherDate && dayElem.dateObj <= maxWeatherDate) {
              dayElem.classList.add("weather-available");
            }
          },
          onChange: (selectedDates, dateStr) => { 
            updateChecklist(); 
            fetchWeather(dateStr); 
          } 
        });

        renderSettingsUI();
        updateChecklist();
        fetchWeather(new Date().toISOString().split('T')[0]);
        document.getElementById('startHour').value = "06";
        document.getElementById('startMin').value = "00";
        syncEndTime();

        // 저장된 테마 불러오기
        const savedTheme = localStorage.getItem('4d_theme') || 'dark';
        if (savedTheme === 'light') { 
          document.body.classList.remove('dark-mode'); 
          document.getElementById('themeToggleBtn').innerText = '🌙'; 
        }
      };

      // 다크모드/라이트모드 토글 버튼 정상화
      document.getElementById('themeToggleBtn').onclick = function() {
        const isDark = document.body.classList.toggle('dark-mode');
        this.innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('4d_theme', isDark ? 'dark' : 'light');
      };

      // ==========================================
      // [2] 날씨 조회 시스템 정상화
      // ==========================================
      async function fetchWeather(targetDate) {
        const weatherText = document.getElementById('weatherInfoText');
        weatherText.innerText = `📍 ${targetDate} 기상 조회 중...`;
        weatherText.style.background = 'var(--primary)';

        if (!navigator.geolocation) { 
          weatherText.innerText = "📍 위치 사용 불가"; 
          weatherText.style.background = 'var(--text-muted)';
          return; 
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
          try {
            const { latitude, longitude } = pos.coords;
            // 과거/미래 상관없이 데이터를 가져오도록 hourly 파라미터 사용
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&start_date=${targetDate}&end_date=${targetDate}&hourly=temperature_2m,relative_humidity_2m,weather_code&timezone=Asia/Seoul`);
            const d = await res.json();
            
            if (d.hourly && d.hourly.temperature_2m && d.hourly.temperature_2m.length > 12) {
              const temp = d.hourly.temperature_2m[12] ?? '??';
              const hum = d.hourly.relative_humidity_2m[12] ?? '??';
              const code = d.hourly.weather_code[12] ?? 0;
              const c = { 0:'맑음', 1:'대체로맑음', 2:'구름조금', 3:'흐림', 45:'안개', 61:'약한비', 63:'비', 71:'눈', 95:'뇌우' };
              const label = targetDate === new Date().toISOString().split('T')[0] ? '오늘' : targetDate;
              weatherText.innerText = `기상(${label}): ${c[code] || '흐림'} (${temp}°C, 습도 ${hum}%)`;
              weatherText.style.background = (code >= 61) ? 'var(--danger)' : 'var(--primary)';
            } else {
              weatherText.innerText = `📍 기상 정보 없음 (제공 범위 이탈)`;
              weatherText.style.background = 'var(--text-muted)';
            }
          } catch (e) { 
            weatherText.innerText = "📍 날씨 조회 실패"; 
            weatherText.style.background = 'var(--text-muted)';
          }
        }, () => { 
          weatherText.innerText = "📍 위치 탐색 실패"; 
          weatherText.style.background = 'var(--danger)';
        }, { timeout: 5000 });
      }

      // ==========================================
      // [3] 체크리스트 로직 정상화 (버튼 및 렌더링)
      // ==========================================
      function updateChecklist() {
        const list = document.getElementById('checklistItems');
        if (!list) return;
        list.innerHTML = '';
        
        const b = document.getElementById('buildingSelect').value;
        const dt = document.getElementById('workDate').value;
        if (!dt) return;

        const d = new Date(dt), day = ["일","월","화","수","목","금","토"][d.getDay()];
        const weekNum = Math.ceil((d.getDate() + new Date(d.getFullYear(), d.getMonth(), 1).getDay()) / 7);
        const weekStr = ["","첫째","둘째","셋째","넷째","다섯째"][weekNum];
        
        let tasks = "";
        const ev = globalRules.eventRules.find(r => r.building === b && r.date === dt);
        const mo = globalRules.monthlyRules.find(r => r.building === b && r.weekOrder === weekStr && r.weekday === day);
        const de = globalRules.defaultRules.find(r => r.building === b && r.weekday === day);
        
        if (ev) tasks = ev.tasks; 
        else if (mo) tasks = mo.tasks; 
        else if (de) tasks = de.tasks;
        
        if (tasks) { 
          tasks.split('\n').filter(t => t.trim()).forEach(t => addChecklistItem(t.trim(), false, false)); 
        } else { 
          list.innerHTML = `<li style="color:var(--text-muted); padding:10px; border:1px dashed var(--border-color); border-radius:8px; text-align:center; font-size:0.8rem;">등록된 규칙 없음</li>`; 
        }
      }

      function addChecklistItem(text, isDel, isChk) {
        const li = document.createElement('li');
        li.className = "checklist-item";
        li.innerHTML = `<input type="checkbox" ${isChk ? 'checked' : ''}><span>${text}</span>${isDel ? `<button type="button" class="btn-del-item" onclick="this.parentElement.remove()">삭제</button>` : ''}`;
        document.getElementById('checklistItems').appendChild(li);
      }

      // 현장 추가 항목 [추가] 버튼 정상화
      document.getElementById('addCustomItemBtn').onclick = () => {
        const i = document.getElementById('customItemInput');
        if (i.value.trim()) { 
          // 추가 시 기존의 '등록된 규칙 없음' 안내문 제거
          const emptyMsg = document.querySelector('#checklistItems li[style*="dashed"]');
          if (emptyMsg) emptyMsg.remove();
          
          addChecklistItem("[현장추가] " + i.value.trim(), true, true); 
          i.value = ''; 
        }
      };

      // ==========================================
      // [4] 사진 추가 로직 정상화 (버튼 및 인터락)
      // ==========================================
      document.getElementById('addFieldPhotoBtn').onclick = () => {
        extraPhotoCount++;
        const div = document.createElement('div');
        div.className = 'extra-photo-row';
        div.id = `row_extra_${extraPhotoCount}`;
        div.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
             <span style="font-size:0.75rem; color:var(--primary); font-weight:bold;">📸 작업 사진 #${extraPhotoCount}</span>
             <button type="button" onclick="document.getElementById('row_extra_${extraPhotoCount}').remove()" style="background:none; border:none; color:var(--danger); font-size:0.75rem; font-weight:bold;">삭제</button>
          </div>
          <input type="text" id="desc_extra_${extraPhotoCount}" placeholder="사진 설명 입력 (입력해야 버튼 활성화)" oninput="togglePhotoBtn(${extraPhotoCount})">
          <label id="label_file_extra_${extraPhotoCount}" class="photo-btn-label disabled">
            사진촬영
            <input type="file" id="file_extra_${extraPhotoCount}" accept="image/*" capture="environment" style="display:none;" disabled>
          </label>
        `;
        document.getElementById('fieldPhotos').appendChild(div);
      };

      // 글로벌 함수로 선언하여 HTML 인라인 이벤트에서 호출 가능하도록 함
      window.togglePhotoBtn = function(id) {
        const input = document.getElementById(`desc_extra_${id}`);
        const label = document.getElementById(`label_file_extra_${id}`);
        const file = document.getElementById(`file_extra_${id}`);
        const ok = input.value.trim().length > 0;
        label.classList.toggle('disabled', !ok);
        file.disabled = !ok;
      };

      // ==========================================
      // [5] 시간 및 선택 UI 관련 정상화
      // ==========================================
      function initTimeOptions() {
        const startH = document.getElementById('startHour'), endH = document.getElementById('endHour');
        const range = isExpanded ? {start: 0, end: 23} : {start: 6, end: 20};
        const curS = startH.value;
        startH.innerHTML = ''; endH.innerHTML = '';
        for(let i=range.start; i<=range.end; i++) {
          const v = i.toString().padStart(2, '0');
          startH.innerHTML += `<option value="${v}">${v}시</option>`;
          endH.innerHTML += `<option value="${v}">${v}시</option>`;
        }
        if(curS && curS >= range.start && curS <= range.end) startH.value = curS;
      }

      function syncEndTime() {
        const h = parseInt(document.getElementById('startHour').value);
        let eh = h + 1;
        const max = isExpanded ? 23 : 20;
        if (eh > max) eh = max;
        document.getElementById('endHour').value = eh.toString().padStart(2, '0');
        document.getElementById('endMin').value = document.getElementById('startMin').value;
      }

      document.getElementById('btnExpandTime').onclick = function() {
        isExpanded = !isExpanded;
        this.innerText = isExpanded ? "시간 축소" : "시간 확장 (00~23시)";
        this.classList.toggle('active', isExpanded);
        initTimeOptions(); 
        syncEndTime();
      };

      function initSelects() {
        const ts = document.getElementById('interiorTemp'), hs = document.getElementById('interiorHumidity');
        ts.innerHTML = '<option value="">미선택</option>'; hs.innerHTML = '<option value="">미선택</option>';
        for(let i=10; i<=40; i++) ts.innerHTML += `<option value="${i}">${i}°C</option>`;
        for(let i=0; i<=100; i+=5) hs.innerHTML += `<option value="${i}">${i}%</option>`;
      }

      // ==========================================
      // [6] 설정 탭 렌더링 정상화 (규칙 추가/삭제)
      // ==========================================
      function renderSettingsUI() {
        const renderList = (id, type, arr) => {
          const l = document.getElementById(id); 
          if(l) { l.innerHTML = ''; arr.forEach(d => window.addRuleRow(type, d)); }
        };
        renderList('defaultRulesList', 'default', globalRules.defaultRules);
        renderList('monthlyRulesList', 'monthly', globalRules.monthlyRules);
        renderList('eventRulesList', 'event', globalRules.eventRules);
      }

      window.addRuleRow = function(type, data = {}) {
        const div = document.createElement('div');
        div.className = 'rule-row';
        div.style.cssText = "background: var(--bg-card); padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border-color);";
        
        div.innerHTML = `<div class="rule-header" style="text-align: right; margin-bottom: 5px;">
                          <button type="button" class="delete-rule" onclick="this.parentElement.parentElement.remove()" style="background:var(--danger); color:white; border:none; border-radius:4px; padding:4px 8px; font-size:0.75rem;">삭제</button>
                        </div>
                        <select class="rule-building" style="margin-bottom:6px;"><option value="백산빌딩" ${data.building==='백산빌딩'?'selected':''}>백산빌딩</option><option value="효성빌딩" ${data.building==='효성빌딩'?'selected':''}>효성빌딩</option></select>`;
        if(type === 'default') { 
          div.innerHTML += `<select class="rule-weekday" style="margin-bottom:6px;">${['월','화','수','목','금','토','일'].map(d=>`<option value="${d}" ${data.weekday===d?'selected':''}>${d}요일</option>`).join('')}</select>`; 
        } else if(type === 'monthly') {
          div.innerHTML += `<select class="rule-weekorder" style="margin-bottom:6px;">${['첫째','둘째','셋째','넷째','다섯째'].map(w=>`<option value="${w}" ${data.weekOrder===w?'selected':''}>${w} 주</option>`).join('')}</select>`;
          div.innerHTML += `<select class="rule-weekday" style="margin-bottom:6px;">${['월','화','수','목','금','토','일'].map(d=>`<option value="${d}" ${data.weekday===d?'selected':''}>${d}요일</option>`).join('')}</select>`;
        } else if(type === 'event') { 
          div.innerHTML += `<input type="text" class="rule-date" value="${data.date || ''}" readonly placeholder="날짜 선택" style="margin-bottom:6px;">`; 
        }
        div.innerHTML += `<textarea class="rule-tasks" placeholder="항목 입력 (엔터로 줄 구분)" style="height:60px;">${data.tasks || ''}</textarea>`;
        document.getElementById(`${type}RulesList`).appendChild(div);
        
        if (type === 'event') { 
          flatpickr(div.querySelector('.rule-date'), { locale: "ko", dateFormat: "Y-m-d" }); 
        }
      };

      document.getElementById('saveRulesToServerBtn').onclick = async () => {
        const collect = (id, type) => Array.from(document.getElementById(id).children).map(r => {
          const d = { building: r.querySelector('.rule-building').value, tasks: r.querySelector('.rule-tasks').value };
          if(type === 'default') d.weekday = r.querySelector('.rule-weekday').value;
          if(type === 'monthly') { d.weekOrder = r.querySelector('.rule-weekorder').value; d.weekday = r.querySelector('.rule-weekday').value; }
          if(type === 'event') d.date = r.querySelector('.rule-date').value;
          return d;
        });
        globalRules.defaultRules = collect('defaultRulesList', 'default');
        globalRules.monthlyRules = collect('monthlyRulesList', 'monthly');
        globalRules.eventRules = collect('eventRulesList', 'event');
        localStorage.setItem('4d_rules_cache', JSON.stringify(globalRules));
        
        const overlay = document.getElementById('loadingOverlay'); overlay.style.display = 'flex';
        try { 
          await fetch(APP_SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({action:"SAVE_RULES", rules: globalRules}) }); 
          alert("✅ 규칙 저장 완료!"); 
          updateChecklist(); 
        } catch (e) { alert("저장 실패"); }
        finally { overlay.style.display = 'none'; }
      };

      function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t + '-tab').style.display = 'block';
        document.querySelector(`[data-tab="${t}"]`).classList.add('active');
      }

      // ==========================================
      // [7] 고속 압축 및 전송 로직 (정상 작동)
      // ==========================================
      const compressImage = (file, maxWidth = 1024, quality = 0.6) => {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              let w = img.width, h = img.height;
              if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
              canvas.width = w; canvas.height = h;
              canvas.getContext('2d').drawImage(img, 0, 0, w, h);
              resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
            };
          };
          reader.readAsDataURL(file);
        });
      };

      document.getElementById('saveWorkBtn').onclick = async () => {
        const overlay = document.getElementById('loadingOverlay'), pBar = document.getElementById('progressBar'), pStat = document.getElementById('progressStatus'), lTitle = document.getElementById('loadingTitle'), dLog = document.getElementById('detailLog');
        const checklistItems = Array.from(document.querySelectorAll('#checklistItems li')).map(li => ({ item: li.querySelector('span').innerText, checked: li.querySelector('input').checked ? "O" : "X" }));
        
        if (checklistItems.length === 0) {
          alert("⚠️ 청소내역을 추가해 주세요.\n(등록된 규칙이 없으면 '현장 추가 항목'에 내용을 적고 추가 버튼을 눌러주세요)");
          return;
        }

        overlay.style.display = 'flex';
        const updateProgress = (title, status, detail, percent) => {
          lTitle.innerText = title; pStat.innerText = status; dLog.innerText = detail; pBar.style.width = percent + '%';
        };

        try {
          updateProgress("데이터 취합 중...", "전송 데이터 패키징", "작업 정보를 수집하고 있습니다.", 15);
          const stH = document.getElementById('startHour').value, stM = document.getElementById('startMin').value;
          const etH = document.getElementById('endHour').value, etM = document.getElementById('endMin').value;
          
          let diffMin = (parseInt(etH)*60 + parseInt(etM)) - (parseInt(stH)*60 + parseInt(stM));
          if (diffMin < 0) diffMin += 24 * 60; // 야간 작업 대응
          const duration = `${Math.floor(diffMin/60)}시간 ${diffMin%60}분`;
          
          const payload = {
            workDate: document.getElementById('workDate').value,
            startTime: `${stH}:${stM}`, endTime: `${etH}:${etM}`, workDuration: duration,
            building: document.getElementById('buildingSelect').value,
            worker: document.getElementById('workerName').value,
            weather: document.getElementById('weatherInfoText').innerText,
            interiorTemp: document.getElementById('interiorTemp').value,
            interiorHumid: document.getElementById('interiorHumidity').value,
            customerReq: document.getElementById('customerRequest').value,
            workMemo: document.getElementById('workMemo').value,
            yearMonthFolder: document.getElementById('workDate').value.substring(0,7).replace('-',''),
            checklist: checklistItems,
            photos: []
          };

          const thF = document.getElementById('photoThermometer').files[0];
          const exPRs = Array.from(document.querySelectorAll('.extra-photo-row')).filter(r => r.querySelector('input[type="file"]').files[0]);
          const totF = (thF ? 1 : 0) + exPRs.length;
          let doneF = 0;

          if(thF) { 
            doneF++; 
            updateProgress("로컬 최적화 중...", `[${doneF}/${totF}] 온습도계 사진 압축`, "사진 용량을 줄여 전송 속도를 높입니다.", 20 + (doneF/totF*30));
            payload.photos.push({ fileName: `${payload.workDate.replace(/-/g,'')}_내부온습도.JPG`, data: await compressImage(thF) }); 
          }
          for(let r of exPRs) { 
            doneF++; 
            updateProgress("로컬 최적화 중...", `[${doneF}/${totF}] 작업 사진 압축`, "사진 용량을 줄여 전송 속도를 높입니다.", 20 + (doneF/totF*30));
            payload.photos.push({ fileName: `${payload.workDate.replace(/-/g,'')}_작업사진${doneF}.JPG`, data: await compressImage(r.querySelector('input[type="file"]').files[0]) }); 
          }

          updateProgress("서버 전송 중...", "구글 클라우드 연결", "압축된 데이터를 전송하고 있습니다.", 60);
          await fetch(APP_SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(payload) });
          
          updateProgress("기록 완료!", "모든 데이터 전송 완료", "일지가 안전하게 저장되었습니다.", 100);
          setTimeout(() => { alert("✅ 일지 전송 성공!"); location.reload(); }, 500);
        } catch (e) { alert("❌ 에러: " + e.message); overlay.style.display = 'none'; }
      };
    </script>
  </body>
</html>
