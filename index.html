<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>4D클린 현장 일지 (Master)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <style>
      :root { --primary: #6366f1; --primary-dark: #4f46e5; --bg-main: #111827; --danger: #ef4444; }
      body { font-family: sans-serif; background: var(--bg-main); margin: 0; padding: 10px; padding-bottom: 80px; color: #f3f4f6; transition: background 0.3s; }
      .container { max-width: 600px; margin: 0 auto; background: #1f2937; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
      .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #374151; padding-bottom: 10px; }
      .tab-btn { flex: 1; padding: 12px; border: none; background: #374151; color: #9ca3af; border-radius: 8px; cursor: pointer; font-weight: bold; }
      .tab-btn.active { background: var(--primary); color: white; }
      .card { border: 1px solid #374151; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #1f2937; }
      .card h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #374151; padding-bottom: 8px; margin-bottom: 12px; }
      label { display: block; font-size: 0.8rem; font-weight: bold; color: #e5e7eb; margin-bottom: 4px; }
      
      /* 모바일 글자 잘림 방지용 Select 스타일 */
      input, select, textarea { 
        width: 100%; 
        padding: 10px 8px; 
        border: 1px solid #4b5563; 
        border-radius: 6px; 
        background: #374151; 
        color: white; 
        margin-top: 4px; 
        box-sizing: border-box;
        font-size: 0.95rem;
      }
      
      /* 시간 선택 그리드 최적화 */
      .time-select-grid { 
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 8px; 
        margin-top: 10px; 
      }
      .time-box { 
        background: #111827; 
        padding: 10px 8px; 
        border-radius: 8px; 
        border: 1px solid #374151; 
      }
      .time-box label { font-size: 0.75rem; color: #9ca3af; }
      .time-box div { display: flex; gap: 4px; margin-top: 5px; }
      
      /* 시간/분 선택창 글자 잘림 방지 핵심 CSS */
      .time-box select { 
        flex: 1; 
        padding: 8px 4px; /* 가로 패딩 최소화 */
        font-size: 0.85rem; 
        min-width: 0; /* flex 안에서 요소가 삐져나가지 않게 고정 */
        text-align: center;
      }

      .bottom-fixed-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px; background: #1f2937; border-top: 1px solid #374151; display: flex; justify-content: center; z-index: 100; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); }
      .save-work-btn-large { width: 100%; max-width: 600px; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
      
      .loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white; backdrop-filter: blur(5px); }
      .progress-container { width: 80%; max-width: 300px; background: #374151; height: 10px; border-radius: 5px; margin-top: 20px; overflow: hidden; }
      .progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s ease; }
      .spinner { width: 40px; height: 40px; border: 4px solid #374151; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      
      .checklist-item { display: flex; align-items: center; gap: 10px; background: #374151; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #4b5563; }
      .checklist-item input[type="checkbox"] { width: 22px; height: 22px; flex-shrink: 0; }
      .checklist-item span { flex: 1; font-size: 0.9rem; }
      .btn-del-item { color: var(--danger); background: none; border: 1px solid var(--danger); padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; }
      
      .btn-expand { background: #4b5563; color: #fff; border: none; padding: 6px; border-radius: 5px; font-size: 0.75rem; width: 100%; margin-top: 8px; cursor: pointer; }
      .btn-expand.active { background: var(--primary); }
      .weather-badge { font-size:0.8rem; color:#a5b4fc; margin-bottom:12px; background:#312e81; padding:6px 10px; border-radius:6px; display:inline-block; }
      .extra-photo-row { background: #111827; padding: 12px; border-radius: 10px; border: 1px dashed #4b5563; margin-bottom: 10px; }
      .photo-btn-label { display: block; width: 100%; padding: 10px; background: var(--primary); color: white; text-align: center; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 8px; }
      .photo-btn-label.disabled { background: #4b5563; opacity: 0.5; cursor: not-allowed; }
    </style>
  </head>
  <body class="dark-mode">
    <main class="container">
      <div class="app-header">
        <h1 style="font-size: 1.3rem; margin:0;">4D클린 현장 일지</h1>
        <button id="themeToggleBtn" type="button" style="background:none; border:none; font-size: 1.2rem;">☀️</button>
      </div>

      <div class="tabs" style="display:flex; gap:8px; margin-bottom:15px;">
        <button class="tab-btn active" data-tab="main" onclick="switchTab('main')">작업 기록</button>
        <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">규칙 설정</button>
      </div>

      <div id="main-tab" class="tab-content active">
        <section class="card">
          <h2>1) 작업 기본 정보</h2>
          <div id="weatherInfoText" class="weather-badge">📍 날씨 수신 중...</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <label>작업 날짜 <input id="workDate" type="date"></label>
            <label>현장 작업자 <select id="workerName"><option value="이영준">이영준</option><option value="조혜진">조혜진</option></select></label>
          </div>
          <label style="margin-top:10px;">대상 건물 <select id="buildingSelect" onchange="updateChecklist()"><option value="백산빌딩">백산빌딩</option><option value="효성빌딩">효성빌딩</option></select></label>
          
          <div class="time-select-grid">
            <div class="time-box">
              <label>시작 시간</label>
              <div>
                <select id="startHour" onchange="syncEndTime()"></select>
                <select id="startMin" onchange="syncEndTime()"><option value="00">00분</option><option value="30">30분</option></select>
              </div>
            </div>
            <div class="time-box">
              <label>종료 시간</label>
              <div>
                <select id="endHour"></select>
                <select id="endMin"><option value="00">00분</option><option value="30">30분</option></select>
              </div>
            </div>
          </div>
          <button type="button" id="btnExpandTime" class="btn-expand">시간 확장 (00~23시)</button>
        </section>

        <section class="card">
          <h2 style="border-bottom:none; margin-bottom:4px;">2) 오늘의 청소 체크리스트</h2>
          <div style="font-size: 11px; color: #9ca3af; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #374151;">우선순위: 고객요청 이벤트 → 월정기 → 기본</div>
          <ul id="checklistItems" style="list-style:none; padding:0;"></ul>
          <div style="display:flex; gap:6px; margin-top:10px;">
            <input type="text" id="customItemInput" placeholder="현장 추가 항목" style="margin:0;">
            <button id="addCustomItemBtn" type="button" style="background:var(--primary); color:white; border:none; padding:0 12px; border-radius:6px; font-weight:bold;">추가</button>
          </div>
        </section>

        <section class="card">
          <h2>3) 사진 및 환경 데이터</h2>
          <div style="font-size:10px; color:#10b981; margin-bottom:10px; background: rgba(16, 185, 129, 0.1); padding: 8px; border-radius: 4px;">※ 온습도계 촬영 시 OCR 엔진이 자동 판독합니다.</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;">
             <label>내부 온도 <select id="interiorTemp"></select></label>
             <label>내부 습도 <select id="interiorHumidity"></select></label>
          </div>
          <input id="photoThermometer" type="file" accept="image/*" capture="environment" style="display:none;">
          <button type="button" onclick="document.getElementById('photoThermometer').click()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;">📸 온습도계 사진 촬영</button>
          <div id="fieldPhotos"></div>
          <button id="addFieldPhotoBtn" type="button" style="width:100%; padding:12px; background:#10b981; color:white; border:none; border-radius:8px; font-weight:bold;">+ 작업 사진 추가</button>
        </section>

        <section class="card">
          <h2>4) 마무리 기록</h2>
          <label>고객 요청사항 <textarea id="customerRequest" rows="2" placeholder="전달사항 입력"></textarea></label>
          <label style="margin-top:10px;">작업자 메모 <textarea id="workMemo" rows="2" placeholder="특이사항"></textarea></label>
        </section>
      </div>

      <div id="settings-tab" class="tab-content" style="display:none;">
        <section class="card">
          <h2 style="color:var(--primary);">규칙 관리 및 서버 동기화</h2>
          <div id="rulesAdminContainer">
            <h3>기본 규칙 (요일별)</h3><div id="defaultRulesList"></div>
            <button type="button" onclick="addRuleRow('default')" style="width:100%; padding:10px; background:#374151; color:white; border:none; border-radius:6px; margin-bottom:15px;">+ 기본 규칙 추가</button>
            <h3>월정기 규칙 (주차별)</h3><div id="monthlyRulesList"></div>
            <button type="button" onclick="addRuleRow('monthly')" style="width:100%; padding:10px; background:#374151; color:white; border:none; border-radius:6px; margin-bottom:15px;">+ 월정기 규칙 추가</button>
            <h3>고객요청 이벤트 (날짜별)</h3><div id="eventRulesList"></div>
            <button type="button" onclick="addRuleRow('event')" style="width:100%; padding:10px; background:#374151; color:white; border:none; border-radius:6px; margin-bottom:15px;">+ 고객요청 규칙 추가</button>
          </div>
          <button id="saveRulesToServerBtn" type="button" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:10px; margin-top:20px; font-weight:bold;">🌐 서버에 규칙 저장</button>
        </section>
      </div>
    </main>

    <div class="bottom-fixed-bar">
      <button id="saveWorkBtn" class="save-work-btn-large">작업 일지 서버 전송</button>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
      <div class="spinner"></div>
      <p id="loadingTitle" style="margin-top:15px; font-weight:bold; font-size: 1.1rem;">데이터 처리 중...</p>
      <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
      <p id="progressStatus" style="margin-top: 10px; font-size: 0.85rem; color: #a5b4fc;">준비 중...</p>
    </div>

    <script>
      const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgkKi6qzWkd4ZBM1xECxtgdO80ynvIaUb5C3YoQQ6z7Ae_qN6hb1WnYXBircD5QThJDw/exec";
      let globalRules = JSON.parse(localStorage.getItem('4d_rules_cache')) || { defaultRules: [], monthlyRules: [], eventRules: [] };
      let extraPhotoCount = 0;
      let isExpanded = false;

      window.onload = async () => {
        initTimeOptions();
        initSelects();
        flatpickr("#workDate", { locale: "ko", defaultDate: "today", onChange: updateChecklist });
        renderSettingsUI();
        updateChecklist();
        fetchWeather();
        document.getElementById('startHour').value = "06";
        document.getElementById('startMin').value = "00";
        syncEndTime();
      };

      function initTimeOptions() {
        const startH = document.getElementById('startHour');
        const endH = document.getElementById('endHour');
        const range = isExpanded ? {start: 0, end: 23} : {start: 6, end: 20};
        const curS = startH.value, curE = endH.value;
        startH.innerHTML = ''; endH.innerHTML = '';
        for(let i=range.start; i<=range.end; i++) {
          const v = i.toString().padStart(2, '0');
          startH.innerHTML += `<option value="${v}">${v}시</option>`;
          endH.innerHTML += `<option value="${v}">${v}시</option>`;
        }
        if(curS && curS >= range.start && curS <= range.end) startH.value = curS;
        if(curE && curE >= range.start && curE <= range.end) endH.value = curE;
      }

      function syncEndTime() {
        const h = parseInt(document.getElementById('startHour').value);
        const m = document.getElementById('startMin').value;
        let eh = h + 1;
        const max = isExpanded ? 23 : 20;
        if(eh > max) eh = max;
        document.getElementById('endHour').value = eh.toString().padStart(2, '0');
        document.getElementById('endMin').value = m;
      }

      document.getElementById('btnExpandTime').onclick = function() {
        isExpanded = !isExpanded;
        this.innerText = isExpanded ? "시간 축소 (06~20시)" : "시간 확장 (00~23시)";
        this.classList.toggle('active', isExpanded);
        initTimeOptions(); syncEndTime();
      };

      function initSelects() {
        const ts = document.getElementById('interiorTemp'), hs = document.getElementById('interiorHumidity');
        ts.innerHTML = '<option value="">미선택</option>'; hs.innerHTML = '<option value="">미선택</option>';
        for(let i=0; i<=40; i++) ts.innerHTML += `<option value="${i}">${i}°C</option>`;
        for(let i=0; i<=100; i+=5) hs.innerHTML += `<option value="${i}">${i}%</option>`;
      }

      document.getElementById('addFieldPhotoBtn').onclick = () => {
        extraPhotoCount++;
        const div = document.createElement('div');
        div.className = 'extra-photo-row';
        div.id = `row_extra_${extraPhotoCount}`;
        div.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
             <span style="font-size:0.75rem; color:var(--primary); font-weight:bold;">📸 작업 사진 #${extraPhotoCount}</span>
             <button type="button" onclick="document.getElementById('row_extra_${extraPhotoCount}').remove()" style="background:none; border:none; color:var(--danger); font-size:0.75rem;">삭제</button>
          </div>
          <input type="text" id="desc_extra_${extraPhotoCount}" placeholder="사진 설명 입력" oninput="togglePhotoBtn(${extraPhotoCount})">
          <label id="label_file_extra_${extraPhotoCount}" class="photo-btn-label disabled">
            사진촬영
            <input type="file" id="file_extra_${extraPhotoCount}" accept="image/*" capture="environment" style="display:none;" disabled>
          </label>
        `;
        document.getElementById('fieldPhotos').appendChild(div);
      };

      function togglePhotoBtn(id) {
        const input = document.getElementById(`desc_extra_${id}`);
        const label = document.getElementById(`label_file_extra_${id}`);
        const file = document.getElementById(`file_extra_${id}`);
        const ok = input.value.trim().length > 0;
        label.classList.toggle('disabled', !ok);
        file.disabled = !ok;
      }

      function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t + '-tab').style.display = 'block';
        document.querySelector(`[data-tab="${t}"]`).classList.add('active');
      }

      function fetchWeather() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(async (pos) => {
          try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current=temperature_2m,relative_humidity_2m,weather_code&timezone=Asia/Seoul`);
            const d = await res.json();
            const c = { 0:'맑음', 1:'대체로맑음', 2:'구름조금', 3:'흐림', 45:'안개', 61:'약한비', 63:'비' };
            document.getElementById('weatherInfoText').innerText = `날씨정보 : ${c[d.current.weather_code] || '정보없음'} (${d.current.temperature_2m}°C, 습도 ${d.current.relative_humidity_2m}%)`;
          } catch (e) { document.getElementById('weatherInfoText').innerText = "날씨 연동 실패"; }
        });
      }

      function updateChecklist() {
        const list = document.getElementById('checklistItems');
        list.innerHTML = '';
        const b = document.getElementById('buildingSelect').value;
        const dt = document.getElementById('workDate').value;
        const d = new Date(dt);
        const day = ["일","월","화","수","목","금","토"][d.getDay()];
        const weekNum = Math.ceil((d.getDate() + new Date(d.getFullYear(), d.getMonth(), 1).getDay()) / 7);
        const weekStr = ["","첫째","둘째","셋째","넷째","다섯째"][weekNum];
        let tasks = "";
        const ev = globalRules.eventRules.find(r => r.building === b && r.date === dt);
        const mo = globalRules.monthlyRules.find(r => r.building === b && r.weekOrder === weekStr && r.weekday === day);
        const de = globalRules.defaultRules.find(r => r.building === b && r.weekday === day);
        if(ev) tasks = ev.tasks; else if(mo) tasks = mo.tasks; else if(de) tasks = de.tasks;
        if(tasks) { tasks.split('\n').filter(t => t.trim()).forEach(t => addChecklistItem(t.trim(), false, false)); }
        else { list.innerHTML = `<li style="color:gray; padding:10px; border:1px dashed #374151; border-radius:8px; text-align:center; font-size:0.8rem;">등록된 규칙 없음</li>`; }
      }

      function addChecklistItem(text, isDel, isChk) {
        const li = document.createElement('li');
        li.className = "checklist-item";
        li.innerHTML = `<input type="checkbox" ${isChk ? 'checked' : ''}><span>${text}</span>${isDel ? `<button type="button" class="btn-del-item" onclick="this.parentElement.remove()">삭제</button>` : ''}`;
        document.getElementById('checklistItems').appendChild(li);
      }

      document.getElementById('addCustomItemBtn').onclick = () => {
        const i = document.getElementById('customItemInput');
        if(i.value.trim()) { addChecklistItem("[현장추가] " + i.value.trim(), true, true); i.value = ''; }
      };

      function renderSettingsUI() {
        const renderList = (id, type, arr) => {
          const l = document.getElementById(id); l.innerHTML = '';
          arr.forEach(d => addRuleRow(type, d));
        };
        renderList('defaultRulesList', 'default', globalRules.defaultRules);
        renderList('monthlyRulesList', 'monthly', globalRules.monthlyRules);
        renderList('eventRulesList', 'event', globalRules.eventRules);
      }

      function addRuleRow(type, data = {}) {
        const div = document.createElement('div');
        div.className = 'rule-row';
        div.innerHTML = `<div class="rule-header"><button type="button" class="delete-rule" onclick="this.parentElement.parentElement.remove()">삭제</button></div>
                    <select class="rule-building"><option value="백산빌딩" ${data.building==='백산빌딩'?'selected':''}>백산빌딩</option><option value="효성빌딩" ${data.building==='효성빌딩'?'selected':''}>효성빌딩</option></select>`;
        if(type === 'default') { div.innerHTML += `<select class="rule-weekday">${['월','화','수','목','금','토','일'].map(d=>`<option value="${d}" ${data.weekday===d?'selected':''}>${d}요일</option>`).join('')}</select>`; }
        else if(type === 'monthly') {
          div.innerHTML += `<select class="rule-weekorder">${['첫째','둘째','셋째','넷째','다섯째'].map(w=>`<option value="${w}" ${data.weekOrder===w?'selected':''}>${w} 주</option>`).join('')}</select>`;
          div.innerHTML += `<select class="rule-weekday">${['월','화','수','목','금','토','일'].map(d=>`<option value="${d}" ${data.weekday===d?'selected':''}>${d}요일</option>`).join('')}</select>`;
        } else if(type === 'event') { div.innerHTML += `<input type="text" class="rule-date" value="${data.date || ''}" readonly>`; }
        div.innerHTML += `<textarea class="rule-tasks" placeholder="항목 입력">${data.tasks || ''}</textarea>`;
        document.getElementById(`${type}RulesList`).appendChild(div);
        if (type === 'event') { flatpickr(div.querySelector('.rule-date'), { locale: "ko", dateFormat: "Y-m-d" }); }
      }

      document.getElementById('saveWorkBtn').onclick = async () => {
        const overlay = document.getElementById('loadingOverlay'), pBar = document.getElementById('progressBar'), pStat = document.getElementById('progressStatus'), lTitle = document.getElementById('loadingTitle');
        overlay.style.display = 'flex'; pBar.style.width = '5%'; pStat.innerText = "데이터 취합 중...";
        const toB64 = f => new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result.split(',')[1]); rd.readAsDataURL(f); });
        const sleep = ms => new Promise(res => setTimeout(res, ms));
        try {
          const st = `${document.getElementById('startHour').value}:${document.getElementById('startMin').value}`;
          const et = `${document.getElementById('endHour').value}:${document.getElementById('endMin').value}`;
          const payload = {
            workDate: document.getElementById('workDate').value,
            workTime: `${st} ~ ${et}`,
            building: document.getElementById('buildingSelect').value,
            worker: document.getElementById('workerName').value,
            weather: document.getElementById('weatherInfoText').innerText,
            interiorTemp: document.getElementById('interiorTemp').value,
            interiorHumid: document.getElementById('interiorHumidity').value,
            customerReq: document.getElementById('customerRequest').value,
            workMemo: document.getElementById('workMemo').value,
            yearMonthFolder: document.getElementById('workDate').value.substring(0,7).replace('-',''),
            checklist: Array.from(document.querySelectorAll('#checklistItems li')).map(li => ({ item: li.querySelector('span').innerText, checked: li.querySelector('input').checked ? "O" : "X" })),
            photos: []
          };
          const thF = document.getElementById('photoThermometer').files[0];
          const exPRs = Array.from(document.querySelectorAll('.extra-photo-row')).filter(r => r.querySelector('input[type="file"]').files[0]);
          const totF = (thF ? 1 : 0) + exPRs.length;
          let doneF = 0;
          if(thF) { doneF++; pBar.style.width = Math.floor((doneF / (totF + 1)) * 90) + '%'; pStat.innerText = `[${doneF}/${totF}] 온습도계 사진 변환 중...`; await sleep(500); payload.photos.push({ fileName: `${payload.workDate.replace(/-/g,'')}_내부온습도.JPG`, data: await toB64(thF) }); }
          for(let r of exPRs) { doneF++; const d = r.querySelector('input[type="text"]').value.trim() || "작업사진"; pBar.style.width = Math.floor((doneF / (totF + 1)) * 90) + '%'; pStat.innerText = `[${doneF}/${totF}] ${d} 변환 중...`; await sleep(500); payload.photos.push({ fileName: `${payload.workDate.replace(/-/g,'')}_${d.replace(/\s+/g,'_')}.JPG`, data: await toB64(r.querySelector('input[type="file"]').files[0]) }); }
          pBar.style.width = '95%'; lTitle.innerText = "서버 전송 중..."; pStat.innerText = "구글 시트에 일지를 기록하고 있습니다.";
          await fetch(APP_SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(payload) });
          pBar.style.width = '100%'; pStat.innerText = "전송 완료!"; await sleep(500); alert("✅ 일지 전송 성공!"); location.reload();
        } catch (e) { alert("❌ 에러: " + e.message); overlay.style.display = 'none'; }
      };

      document.getElementById('saveRulesToServerBtn').onclick = async () => {
        const collect = (id, type) => Array.from(document.getElementById(id).children).map(r => {
          const d = { building: r.querySelector('.rule-building').value, tasks: r.querySelector('.rule-tasks').value };
          if(type === 'default') d.weekday = r.querySelector('.rule-weekday').value;
          if(type === 'monthly') { d.weekOrder = r.querySelector('.rule-weekorder').value; d.weekday = r.querySelector('.rule-weekday').value; }
          if(type === 'event') d.date = r.querySelector('.rule-date').value;
          return d;
        });
        globalRules.defaultRules = collect('defaultRulesList', 'default');
        globalRules.monthlyRules = collect('monthlyRulesList', 'monthly');
        globalRules.eventRules = collect('eventRulesList', 'event');
        localStorage.setItem('4d_rules_cache', JSON.stringify(globalRules));
        const overlay = document.getElementById('loadingOverlay'); overlay.style.display = 'flex';
        try { await fetch(APP_SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({action:"SAVE_RULES", rules: globalRules}) }); alert("✅ 규칙 저장 완료!"); updateChecklist(); } catch (e) { alert("저장 실패"); }
        finally { overlay.style.display = 'none'; }
      };
    </script>
  </body>
</html>
