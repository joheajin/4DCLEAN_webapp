<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>4D클린 현장 일지 (Master)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/ko.min.js"></script>
    <style>
      :root {
        --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #8b5cf6; 
        --danger: #ef4444; --success: #10b981; --bg-main: #f8fafc;
        --bg-container: #ffffff; --bg-card: #f1f5f9; --text-main: #1e293b;
        --text-muted: #64748b; --border-color: #e2e8f0; --input-bg: #ffffff;
      }
      body.dark-mode {
        --bg-main: #0f172a; --bg-container: #1e293b; --bg-card: #334155;
        --text-main: #f1f5f9; --text-muted: #cbd5e1; --border-color: #475569; --input-bg: #1e293b;
      }
      body { font-family: sans-serif; background: var(--bg-main); margin: 0; padding: 10px; padding-bottom: 80px; color: var(--text-main); transition: all 0.3s ease; }
      .container { max-width: 600px; margin: 0 auto; background: var(--bg-container); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
      .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
      .tab-btn { flex: 1; padding: 12px; border: none; background: var(--bg-card); color: var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: bold; }
      .tab-btn.active { background: var(--primary); color: white; }
      .card { border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; background: var(--bg-container); }
      .card h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px; }
      body.dark-mode .card h2 { color: #ffffff; border-bottom-color: #475569; }
      label { display: block; font-size: 0.8rem; font-weight: bold; color: var(--text-muted); margin-bottom: 4px; }
      body.dark-mode label { color: #ffffff; }
      input, select, textarea { width: 100%; padding: 10px 8px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-main); margin-top: 4px; box-sizing: border-box; font-size: 0.95rem; }
      .bottom-fixed-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px; background: var(--bg-container); border-top: 1px solid var(--border-color); display: flex; justify-content: center; z-index: 100; }
      .save-work-btn-large { width: 100%; max-width: 600px; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
      .checklist-item { display: flex; align-items: center; gap: 10px; background: var(--bg-card); padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border-color); }
      .checklist-item input[type="checkbox"] { width: 22px; height: 22px; flex-shrink: 0; }
      .checklist-item span { flex: 1; font-size: 0.9rem; }
      .extra-photo-row { background: var(--bg-card); padding: 12px; border-radius: 10px; border: 1px dashed var(--border-color); margin-bottom: 10px; position: relative; }
      .upload-status { font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
      .status-wait { background: #e2e8f0; color: #64748b; }
      .status-loading { background: #fef3c7; color: #d97706; animation: pulse 1s infinite; }
      .status-done { background: #d1fae5; color: #059669; }
      @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
      .task-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
      .task-tabs label { flex: 1 1 calc(50% - 6px); min-width: 130px; text-align: center; cursor: pointer; }
      .task-tabs input[type="radio"] { display: none; }
      .task-tabs span { display: flex; align-items: center; justify-content: center; padding: 10px 6px; font-size: 0.8rem; font-weight: bold; color: var(--text-main); background: var(--bg-container); border: 1px solid var(--border-color); border-radius: 8px; }
      .task-tabs input[type="radio"]:checked + span { background: var(--success); color: white; border-color: var(--success); }
      .status-tabs { display: flex; gap: 4px; background: var(--input-bg); padding: 4px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 10px; }
      .status-tabs label { flex: 1; text-align: center; cursor: pointer; }
      .status-tabs input[type="radio"] { display: none; }
      .status-tabs span { display: block; padding: 8px 0; font-size: 0.75rem; font-weight: bold; color: var(--text-muted); border-radius: 6px; }
      .status-tabs input[type="radio"]:checked + span { background: var(--primary); color: white; }
      .photo-btn-label { display: block; width: 100%; padding: 12px; background: var(--primary); color: white; text-align: center; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
      .photo-btn-label-alt { background: var(--text-muted); }
      .loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white; backdrop-filter: blur(5px); }
    </style>
  </head>
  <body class="dark-mode">
    <main class="container">
      <div class="app-header">
        <h1 style="font-size: 1.2rem; margin:0;">4D클린 현장 실시간 일지</h1>
        <button id="themeToggleBtn" type="button" style="background:none; border:none; font-size: 1.2rem; cursor:pointer;">☀️</button>
      </div>

      <div class="tabs" style="display:flex; gap:8px; margin-bottom:15px;">
        <button class="tab-btn active" data-tab="main" onclick="switchTab('main')">작업 기록</button>
        <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">규칙 설정</button>
      </div>

      <div id="main-tab" class="tab-content active">
        <section class="card">
          <h2>1) 기본 정보</h2>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <label>날짜 <input id="workDate" type="text" readonly></label>
            <label>작업자 <select id="workerName" class="auto-save"><option value="이영준">이영준</option><option value="조혜진">조혜진</option></select></label>
          </div>
          <label style="margin-top:10px;">현장 <select id="buildingSelect" class="auto-save"><option value="백산빌딩">백산빌딩</option><option value="효성빌딩">효성빌딩</option></select></label>
        </section>

        <section class="card">
          <h2>2) 청소 체크</h2>
          <ul id="checklistItems" style="list-style:none; padding:0;">
             <li class="checklist-item"><input type="checkbox"> <span>1층 로비 청소</span></li>
             <li class="checklist-item"><input type="checkbox"> <span>엘리베이터 살균</span></li>
          </ul>
        </section>

        <section class="card">
          <h2>3) 사진 (선택 시 실시간 전송)</h2>
          <div id="photoThermometerBox" class="extra-photo-row" style="border-style: solid; border-color: var(--primary);">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span style="font-size:0.8rem; font-weight:bold;">🌡️ 온습도계 사진</span>
                <span id="status_thermometer" class="upload-status status-wait">대기</span>
            </div>
            <div style="display:flex; gap:8px;">
                <input id="file_thermometer_cam" type="file" accept="image/*" capture="environment" style="display:none;" onchange="uploadImmediately(this, 'thermometer')">
                <label class="photo-btn-label" style="flex:1;" onclick="document.getElementById('file_thermometer_cam').click()">📸 촬영</label>
                <input id="file_thermometer_gal" type="file" accept="image/*" style="display:none;" onchange="uploadImmediately(this, 'thermometer')">
                <label class="photo-btn-label photo-btn-label-alt" style="flex:1;" onclick="document.getElementById('file_thermometer_gal').click()">🖼️ 첨부</label>
            </div>
          </div>
          <div id="fieldPhotos"></div>
          <button id="addFieldPhotoBtn" type="button" style="width:100%; padding:15px; background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold; margin-top:10px;">+ 작업 사진 추가</button>
        </section>

        <section class="card">
          <h2>4) 메모</h2>
          <textarea id="workMemo" class="auto-save" rows="3" placeholder="특이사항을 입력하세요."></textarea>
        </section>
      </div>

      <div id="settings-tab" class="tab-content" style="display:none;">
        <section class="card"><h2>설정</h2><p>규칙 관리 메뉴</p></section>
      </div>
    </main>

    <div class="bottom-fixed-bar">
      <button id="saveWorkBtn" class="save-work-btn-large">작업 전송</button>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
      <div class="spinner" style="width:40px; height:40px; border:4px solid #fff; border-top-color:var(--primary); border-radius:50%; animation:spin 1s linear infinite;"></div>
      <p id="loadingTitle" style="margin-top:20px; font-weight:bold;">데이터 최종 동기화 중...</p>
    </div>

    <script>
      const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgkKi6qzWkd4ZBM1xECxtgdO80ynvIaUb5C3YoQQ6z7Ae_qN6hb1WnYXBircD5QThJDw/exec";
      let extraPhotoCount = 0;
      let uploadedPhotoPaths = {};

      async function uploadImmediately(input, id) {
        if (!input.files || !input.files[0]) return;
        const statusBadge = document.getElementById(`status_${id}`);
        statusBadge.innerText = "전송 중...";
        statusBadge.className = "upload-status status-loading";
        try {
          const compressedData = await compressImage(input.files[0]);
          const workDate = document.getElementById('workDate').value.replace(/-/g,'');
          const worker = document.getElementById('workerName').value;
          let fileName = `${workDate}_${worker}_${id}.JPG`;
          if (id.startsWith('extra_')) {
            const rowId = id.split('_')[1];
            const taskRadio = document.querySelector(`input[name="task_${rowId}"]:checked`);
            const statusRadio = document.querySelector(`input[name="status_${rowId}"]:checked`);
            const taskName = taskRadio?.value === 'custom' ? document.getElementById(`custom_task_${rowId}`).value : taskRadio?.value;
            fileName = `${workDate}_${worker}_${taskName}_${statusRadio?.value}.JPG`.replace(/\s+/g,'_');
          }
          const payload = { action: "UPLOAD_SINGLE_PHOTO", fileName: fileName, fileData: compressedData, yearMonthFolder: workDate.substring(0,6) };
          await fetch(APP_SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(payload) });
          statusBadge.innerText = "완료";
          statusBadge.className = "upload-status status-done";
          uploadedPhotoPaths[id] = fileName; 
          saveDraft(); 
        } catch (e) {
          statusBadge.innerText = "실패(재시도)";
          statusBadge.className = "upload-status status-wait";
        }
      }

      function compressImage(file) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const maxWidth = 1920;
              let w = img.width, h = img.height;
              if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
              canvas.width = w; canvas.height = h;
              canvas.getContext('2d').drawImage(img, 0, 0, w, h);
              resolve(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
            };
          };
          reader.readAsDataURL(file);
        });
      }

      function saveDraft() {
        const extraPhotosInfo = [];
        document.querySelectorAll('.extra-photo-row[id^="row_extra_"]').forEach(row => {
          const id = row.id.split('_')[2];
          const taskRadio = row.querySelector(`input[name="task_${id}"]:checked`);
          const statusRadio = row.querySelector(`input[name="status_${id}"]:checked`);
          extraPhotosInfo.push({ id: id, task: taskRadio ? taskRadio.value : "", status: statusRadio ? statusRadio.value : "" });
        });
        const draft = { workerName: document.getElementById('workerName').value, buildingSelect: document.getElementById('buildingSelect').value, workMemo: document.getElementById('workMemo').value, uploadedPhotos: uploadedPhotoPaths, extraPhotosInfo: extraPhotosInfo, lastCount: extraPhotoCount };
        localStorage.setItem('4d_draft', JSON.stringify(draft));
      }

      function loadDraft() {
        try {
          const draftStr = localStorage.getItem('4d_draft');
          if (!draftStr) return;
          const draft = JSON.parse(draftStr);
          document.getElementById('workerName').value = draft.workerName || "이영준";
          document.getElementById('buildingSelect').value = draft.buildingSelect || "백산빌딩";
          document.getElementById('workMemo').value = draft.workMemo || "";
          uploadedPhotoPaths = draft.uploadedPhotos || {};
          extraPhotoCount = draft.lastCount || 0;
          if (draft.extraPhotosInfo) {
            draft.extraPhotosInfo.forEach(info => {
              createFieldPhotoRow(info.id, info);
              if (uploadedPhotoPaths[`extra_${info.id}`]) {
                const badge = document.getElementById(`status_extra_${info.id}`);
                badge.innerText = "완료"; badge.className = "upload-status status-done";
              }
            });
          }
        } catch(e) {}
      }

      window.onload = () => {
        flatpickr("#workDate", { locale: "ko", defaultDate: "today", dateFormat: "Y-m-d" });
        loadDraft();
        document.querySelectorAll('.auto-save').forEach(el => el.onchange = saveDraft);
      };

      function createFieldPhotoRow(id, savedInfo = null) {
        const div = document.createElement('div');
        div.className = 'extra-photo-row';
        div.id = `row_extra_${id}`;
        div.innerHTML = `
          <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
             <span style="font-size:0.8rem; font-weight:bold;">📸 사진 #${id}</span>
             <span id="status_extra_${id}" class="upload-status status-wait">대기</span>
          </div>
          <div class="task-tabs">
            <label><input type="radio" name="task_${id}" value="기본" checked><span>기본</span></label>
            <label><input type="radio" name="task_${id}" value="custom"><span>직접입력</span></label>
          </div>
          <input type="text" id="custom_task_${id}" style="display:none; margin-bottom:10px;">
          <div class="status-tabs">
            <label><input type="radio" name="status_${id}" value="작업전"><span>전</span></label>
            <label><input type="radio" name="status_${id}" value="작업중" checked><span>중</span></label>
            <label><input type="radio" name="status_${id}" value="작업후"><span>후</span></label>
          </div>
          <div style="display:flex; gap:8px;">
            <input type="file" id="file_${id}_cam" accept="image/*" capture="environment" style="display:none;" onchange="uploadImmediately(this, 'extra_${id}')">
            <label class="photo-btn-label" style="flex:1;" onclick="document.getElementById('file_${id}_cam').click()">📸 촬영</label>
            <input type="file" id="file_${id}_gal" accept="image/*" style="display:none;" onchange="uploadImmediately(this, 'extra_${id}')">
            <label class="photo-btn-label photo-btn-label-alt" style="flex:1;" onclick="document.getElementById('file_${id}_gal').click()">🖼️ 첨부</label>
          </div>
        `;
        document.getElementById('fieldPhotos').appendChild(div);
      }

      document.getElementById('addFieldPhotoBtn').onclick = () => { extraPhotoCount++; createFieldPhotoRow(extraPhotoCount); saveDraft(); };

      document.getElementById('saveWorkBtn').onclick = async () => {
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';
        const payload = {
          action: "SUBMIT_TEXT_ONLY",
          workDate: document.getElementById('workDate').value,
          worker: document.getElementById('workerName').value,
          building: document.getElementById('buildingSelect').value,
          memo: document.getElementById('workMemo').value,
          checklist: Array.from(document.querySelectorAll('.checklist-item')).map(li => li.innerText + (li.querySelector('input').checked ? ":O" : ":X")),
          uploadedPhotos: uploadedPhotoPaths 
        };
        try {
          await fetch(APP_SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(payload) });
          alert("✅ 모든 작업 보고가 완료되었습니다.");
          localStorage.removeItem('4d_draft');
          location.reload();
        } catch (e) { alert("최종 전송 실패"); } finally { overlay.style.display = 'none'; }
      };

      function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(t + '-tab').style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
      }
    </script>
  </body>
</html>
