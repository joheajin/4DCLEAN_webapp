<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>4D클린 현장 일지 (Master)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/ko.min.js"></script>
    <style>
      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --danger: #ef4444;
        --success: #10b981;
        --bg-main: #f8fafc;
        --bg-container: #ffffff;
        --bg-card: #f1f5f9;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
        --input-bg: #ffffff;
        --weather-available: #facc15; 
      }
      body.dark-mode {
        --bg-main: #0f172a;
        --bg-container: #1e293b;
        --bg-card: #334155;
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
        --border-color: #475569;
        --input-bg: #1e293b;
      }
      body { font-family: sans-serif; background: var(--bg-main); margin: 0; padding: 10px; padding-bottom: 80px; color: var(--text-main); transition: all 0.3s ease; }
      .container { max-width: 600px; margin: 0 auto; background: var(--bg-container); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
      .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
      .tab-btn { flex: 1; padding: 12px; border: none; background: var(--bg-card); color: var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: bold; }
      .tab-btn.active { background: var(--primary); color: white; }
      .card { border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; background: var(--bg-container); }
      .card h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px; }
      
      .rule-section-box {
        border: 2px solid var(--border-color);
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 20px;
        background: var(--bg-card);
      }
      .rule-section-box h3 {
        margin-top: 0;
        margin-bottom: 15px;
        font-size: 0.95rem;
        color: var(--text-main); 
        display: flex;
        align-items: center;
        gap: 8px;
        transition: color 0.3s ease;
      }
      .rule-section-box h3::before {
        content: "";
        width: 4px;
        height: 16px;
        background: var(--primary);
        border-radius: 2px;
      }
      
      #settings-tab h2 { color: var(--text-main); transition: color 0.3s ease; }

      label { display: block; font-size: 0.8rem; font-weight: bold; color: var(--text-muted); margin-bottom: 4px; }
      input, select, textarea { width: 100%; padding: 10px 8px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-main); margin-top: 4px; box-sizing: border-box; font-size: 0.95rem; }
      input[readonly] { cursor: pointer; background-color: var(--input-bg) !important; }
      
      .time-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
      .time-box { background: var(--bg-card); padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border-color); }
      .bottom-fixed-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px; background: var(--bg-container); border-top: 1px solid var(--border-color); display: flex; justify-content: center; z-index: 100; }
      .save-work-btn-large { width: 100%; max-width: 600px; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
      
      .checklist-item { display: flex; align-items: center; gap: 10px; background: var(--bg-card); padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border-color); }
      .checklist-item input[type="checkbox"] { width: 22px; height: 22px; flex-shrink: 0; }
      .checklist-item span { flex: 1; font-size: 0.9rem; }
      .btn-del-item { color: var(--danger); background: none; border: 1px solid var(--danger); padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; }
      .btn-expand { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px; border-radius: 5px; font-size: 0.75rem; width: 100%; margin-top: 8px; cursor: pointer; }
      .weather-badge { font-size: 0.8rem; color: #fff; margin-bottom: 12px; background: var(--primary); padding: 6px 12px; border-radius: 6px; display: inline-block; font-weight: bold; }
      
      .extra-photo-row { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px dashed var(--border-color); margin-bottom: 15px; }
      .photo-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
      .photo-btn-label { display: flex; align-items: center; justify-content: center; padding: 12px 6px; background: var(--primary); color: white; text-align: center; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.85rem; transition: background 0.3s; }
      .photo-btn-label-alt { background: #e11d48; } 
      .photo-btn-label.success { background: var(--success) !important; }
      .photo-btn-label.uploading { background: var(--weather-available) !important; color: #1e293b; pointer-events: none; }
      .photo-btn-label.disabled { opacity: 0.3; pointer-events: none; cursor: not-allowed; }

      .task-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
      .task-tabs label { flex: 1 1 calc(50% - 6px); min-width: 130px; text-align: center; margin: 0; cursor: pointer; }
      .task-tabs input[type="radio"] { display: none; }
      .task-tabs span { display: flex; align-items: center; justify-content: center; padding: 10px 6px; font-size: 0.85rem; font-weight: bold; color: var(--text-main); background: var(--bg-container); border: 1px solid var(--border-color); border-radius: 8px; transition: all 0.2s ease; word-break: keep-all; height: 100%; box-sizing: border-box; }
      .task-tabs input[type="radio"]:checked + span { background: #10b981; color: white; border-color: #10b981; }

      .status-tabs { display: flex; gap: 4px; background: var(--input-bg); padding: 4px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 10px; }
      .status-tabs label { flex: 1; text-align: center; margin: 0; cursor: pointer; }
      .status-tabs input[type="radio"] { display: none; }
      .status-tabs span { display: block; padding: 8px 0; font-size: 0.8rem; font-weight: bold; color: var(--text-muted); border-radius: 6px; }
      .status-tabs input[type="radio"]:checked + span { background: var(--primary); color: white; }

      .loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white; backdrop-filter: blur(5px); }
      .progress-container { width: 85%; max-width: 350px; background: #334155; height: 12px; border-radius: 6px; margin-top: 25px; overflow: hidden; }
      .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary), #818cf8); transition: width 0.4s ease; border-radius: 6px; }
      .spinner { width: 50px; height: 50px; border: 5px solid #334155; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body class="dark-mode">
    <main class="container">
      <div class="app-header">
        <h1 style="font-size: 1.3rem; margin:0;">4D클린 현장 일지</h1>
        <button id="themeToggleBtn" type="button" style="background:none; border:none; font-size: 1.5rem; cursor:pointer;">☀️</button>
      </div>

      <div class="tabs" style="display:flex; gap:8px; margin-bottom:15px;">
        <button class="tab-btn active" data-tab="main" onclick="switchTab('main')">작업 기록</button>
        <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">규칙 설정</button>
      </div>

      <div id="main-tab" class="tab-content active">
        <section class="card">
          <h2>1) 작업 기본 정보</h2>
          <div id="weatherInfoText" class="weather-badge">📍 날씨 데이터 연동 중...</div>
          <div style="font-size: 10px; color: var(--weather-available); margin-bottom: 10px; font-weight: bold;">* 노란색 날짜: 과거/미래 날씨 조회가 가능한 날</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <label>작업 날짜 <input id="workDate" type="text" placeholder="날짜 선택" readonly></label>
            <label>현장 작업자 <select id="workerName" class="auto-save"><option value="이영준">이영준</option><option value="조혜진">조혜진</option></select></label>
          </div>
          <label style="margin-top:10px;">현장 <select id="buildingSelect" class="auto-save" onchange="updateChecklist()"><option value="백산빌딩">백산빌딩</option><option value="효성빌딩">효성빌딩</option></select></label>
          
          <div class="time-select-grid">
            <div class="time-box">
              <label>시작 시간</label>
              <div style="display:flex; gap:4px; margin-top:5px;">
                <select id="startHour" class="auto-save" onchange="syncEndTime()"></select>
                <select id="startMin" class="auto-save" onchange="syncEndTime()"><option value="00">00분</option><option value="30">30분</option></select>
              </div>
            </div>
            <div class="time-box">
              <label>종료 시간</label>
              <div style="display:flex; gap:4px; margin-top:5px;">
                <select id="endHour" class="auto-save"></select>
                <select id="endMin" class="auto-save"><option value="00">00분</option><option value="30">30분</option></select>
              </div>
            </div>
          </div>
          <button type="button" id="btnExpandTime" class="btn-expand">시간 확장 (00~23시)</button>
        </section>

        <section class="card">
          <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px;">
            <h2 style="border:none; margin:0; padding:0;">2) 작업 리스트</h2>
            <div style="display:flex; gap:4px;">
              <button type="button" onclick="checkAllItems(true)" style="background:var(--primary); color:white; border:none; border-radius:4px; padding:4px 8px; font-size:0.7rem; font-weight:bold;">모두 체크</button>
              <button type="button" onclick="checkAllItems(false)" style="background:var(--bg-card); color:var(--text-main); border:1px solid var(--border-color); border-radius:4px; padding:4px 8px; font-size:0.7rem;">모두 해제</button>
            </div>
          </div>
          <ul id="checklistItems" style="list-style:none; padding:0;"></ul>
          <div style="display:flex; gap:6px; margin-top:10px; align-items: center;">
            <input type="text" id="customItemInput" placeholder="현장 추가 항목" style="margin:0; flex: 1; min-width: 0;">
            <button id="addCustomItemBtn" type="button" style="background:var(--primary); color:white; border:none; padding:0 15px; height: 42px; border-radius:6px; font-weight:bold;">추가</button>
          </div>
        </section>

        <section class="card">
          <h2>3) 사진 및 환경 데이터</h2>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;">
             <label>내부 온도 <select id="interiorTemp" class="auto-save"></select></label>
             <label>내부 습도 <select id="interiorHumidity" class="auto-save"></select></label>
          </div>
          
          <div class="photo-btn-group" style="margin-bottom: 15px;">
            <input id="photoThermometerCam" type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImmediateUpload(this, 'photoThermometerCamLabel', 'cam', 'main_thermometer')">
            <label id="photoThermometerCamLabel" class="photo-btn-label" onclick="document.getElementById('photoThermometerCam').click()">📸 온습도계 사진촬영</label>
            <input id="photoThermometerGal" type="file" accept="image/*" style="display:none;" onchange="handleImmediateUpload(this, 'photoThermometerGalLabel', 'gal', 'main_thermometer')">
            <label id="photoThermometerGalLabel" class="photo-btn-label photo-btn-label-alt" onclick="document.getElementById('photoThermometerGal').click()">🖼️ 온습도계 사진첨부</label>
          </div>
          
          <div id="fieldPhotos"></div>
          <button id="addFieldPhotoBtn" type="button" style="width:100%; padding:15px; background:#10b981; color:white; border:none; border-radius:8px; font-weight:bold;">+ 작업 사진 추가</button>
        </section>

        <section class="card">
          <h2>4) 마무리 기록</h2>
          <label>고객 요청사항 <textarea id="customerRequest" class="auto-save" rows="2" placeholder="전달사항 입력"></textarea></label>
          <label style="margin-top:10px;">작업자 메모 <textarea id="workMemo" class="auto-save" rows="2" placeholder="특이사항"></textarea></label>
        </section>
      </div>

      <div id="settings-tab" class="tab-content" style="display:none;">
        <section class="card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="color:#ffffff; margin:0; border:none; padding:0;">규칙 관리</h2>
            <button id="loadRulesFromServerBtn" type="button" style="background:#10b981; color:white; border:none; border-radius:6px; padding:6px 12px; font-size:0.8rem; font-weight:bold;">📥 서버에서 불러오기</button>
          </div>
          <div id="rulesAdminContainer">
            <div class="rule-section-box"><h3>기본 규칙</h3><div id="defaultRulesList"></div><button type="button" onclick="addRuleRow('default')" style="width:100%; padding:10px; background:var(--bg-container); border:1px solid var(--border-color); border-radius:6px; color:var(--text-main);">+ 기본 규칙 추가</button></div>
            <div class="rule-section-box"><h3>월정기 규칙</h3><div id="monthlyRulesList"></div><button type="button" onclick="addRuleRow('monthly')" style="width:100%; padding:10px; background:var(--bg-container); border:1px solid var(--border-color); border-radius:6px; color:var(--text-main);">+ 월정기 규칙 추가</button></div>
            <div class="rule-section-box"><h3>고객요청 규칙</h3><div id="eventRulesList"></div><button type="button" onclick="addRuleRow('event')" style="width:100%; padding:10px; background:var(--bg-container); border:1px solid var(--border-color); border-radius:6px; color:var(--text-main);">+ 고객요청 규칙 추가</button></div>
          </div>
          <button id="saveRulesToServerBtn" type="button" style="width:100%; padding:18px; background:var(--success); color:white; border:none; border-radius:10px; margin-top:20px; font-weight:bold; font-size: 1.1rem;">🌐 서버에 규칙 저장</button>
        </section>
      </div>
    </main>

    <div class="bottom-fixed-bar"><button id="saveWorkBtn" class="save-work-btn-large">작업 서버 저장</button></div>
    <div id="loadingOverlay" class="loading-overlay"><div class="spinner"></div><p id="loadingTitle" style="margin-top:20px; font-weight:bold;">데이터 전송 시작</p><div class="progress-container"><div id="progressBar" class="progress-bar"></div></div><p id="progressStatus" style="margin-top:12px;">준비 중...</p></div>

    <script>
      const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgkKi6qzWkd4ZBM1xECxtgdO80ynvIaUb5C3YoQQ6z7Ae_qN6hb1WnYXBircD5QThJDw/exec";
      let globalRules = { defaultRules: [], monthlyRules: [], eventRules: [] };
      let extraPhotoCount = 0;
      let isExpanded = false;
      let uploadedPhotos = {}; // 개별 업로드된 사진 URL 보관 (Key: photoKey, Value: {url, name})

      async function fetchWithRetry(url, options, maxRetries = 5) {
        let delay = 1000;
        for (let i = 0; i < maxRetries; i++) {
          try {
            const response = await fetch(url, options);
            if (options.mode === 'no-cors') return response;
            if (response.ok) return response;
            throw new Error(`Server returned ${response.status}`);
          } catch (error) {
            if (i === maxRetries - 1) throw error;
            await new Promise(resolve => setTimeout(resolve, delay));
            delay *= 2;
          }
        }
      }

      function saveDraft() {
        const checklistData = Array.from(document.querySelectorAll('#checklistItems li'))
          .filter(li => !li.classList.contains('no-items-placeholder'))
          .map(li => {
            const span = li.querySelector('span'), input = li.querySelector('input');
            return { text: span ? span.innerText : "", checked: input ? input.checked : false, isCustom: li.querySelector('.btn-del-item') !== null };
          });

        const draft = {
          workerName: document.getElementById('workerName').value,
          buildingSelect: document.getElementById('buildingSelect').value,
          customerRequest: document.getElementById('customerRequest').value,
          workMemo: document.getElementById('workMemo').value,
          startHour: document.getElementById('startHour').value,
          startMin: document.getElementById('startMin').value,
          endHour: document.getElementById('endHour').value,
          endMin: document.getElementById('endMin').value,
          interiorTemp: document.getElementById('interiorTemp').value,
          interiorHumidity: document.getElementById('interiorHumidity').value,
          workDate: document.getElementById('workDate').value,
          checklist: checklistData,
          uploadedPhotos: uploadedPhotos,
          extraPhotoCount: extraPhotoCount
        };
        localStorage.setItem('4d_draft', JSON.stringify(draft));
      }

      function loadDraft() {
        try {
          const draftStr = localStorage.getItem('4d_draft');
          if (draftStr) {
            const draft = JSON.parse(draftStr);
            ["workerName", "buildingSelect", "customerRequest", "workMemo", "startHour", "startMin", "endHour", "endMin", "interiorTemp", "interiorHumidity", "workDate"].forEach(key => {
              const el = document.getElementById(key); if(el && draft[key]) el.value = draft[key];
            });
            if (draft.checklist) {
              const list = document.getElementById('checklistItems'); list.innerHTML = '';
              draft.checklist.forEach(item => addChecklistItem(item.text, item.isCustom, item.checked));
            }
            if (draft.uploadedPhotos) {
              uploadedPhotos = draft.uploadedPhotos;
              // 온습도계 버튼 상태 복구
              if (uploadedPhotos['main_thermometer']) {
                document.getElementById('photoThermometerCamLabel').innerText = "✅ 업로드 완료";
                document.getElementById('photoThermometerCamLabel').classList.add('success');
                document.getElementById('photoThermometerGalLabel').style.display = 'none';
              }
            }
            // 작업 사진 행들 복구
            if (draft.extraPhotoCount) {
              for(let i=1; i<=draft.extraPhotoCount; i++) {
                addExtraPhotoRow(i);
                if (uploadedPhotos[`extra_${i}`]) {
                   document.getElementById(`label_file_extra_${i}_cam`).innerText = "✅ 업로드 완료";
                   document.getElementById(`label_file_extra_${i}_cam`).classList.add('success');
                   document.getElementById(`label_file_extra_${i}_gal`).style.display = 'none';
                }
              }
              extraPhotoCount = draft.extraPhotoCount;
            }
          }
        } catch(e) { console.error("Draft 로드 실패", e); }
      }

      function initAutoSaveListeners() {
        document.addEventListener('input', (e) => {
          if (e.target.closest('.auto-save') || e.target.type === 'checkbox' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') saveDraft();
        });
      }

      // [신설] 개별 사진 즉시 업로드 처리 함수
      async function handleImmediateUpload(input, labelId, type, photoKey) {
        if (!input.files || !input.files[0]) return;
        
        const label = document.getElementById(labelId);
        const originalText = label.innerText;
        label.innerText = "⏳ 전송 중...";
        label.classList.add('uploading');

        try {
          const file = input.files[0];
          const photoData = await compressImage(file);
          const workDate = document.getElementById('workDate').value.replace(/-/g,'');
          const building = document.getElementById('buildingSelect').value;
          
          let fileName = "";
          if (photoKey === 'main_thermometer') {
            fileName = `${workDate}_내부온습도.JPG`;
          } else {
            const id = photoKey.split('_')[1];
            const taskRad = document.querySelector(`input[name="task_${id}"]:checked`);
            let tNm = taskRad ? taskRad.value : "작업사진";
            if (tNm === 'custom') tNm = document.getElementById(`custom_task_${id}`).value.trim() || "추가항목";
            const sRad = document.querySelector(`input[name="status_${id}"]:checked`);
            fileName = `${workDate}_${tNm}_${sRad ? sRad.value : "진행"}`.replace(/\s+/g,'_') + ".JPG";
          }

          const response = await fetchWithRetry(APP_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: "UPLOAD_PHOTO",
              photoData: photoData,
              fileName: fileName,
              building: building,
              yearMonthFolder: workDate.substring(0,6)
            })
          });

          const result = await response.json();
          if (result.status === "success") {
            uploadedPhotos[photoKey] = { url: result.url, name: result.fileName };
            label.innerText = "✅ 업로드 완료";
            label.classList.remove('uploading');
            label.classList.add('success');
            
            // 반대편 버튼(촬영/첨부) 숨기기
            const otherType = (type === 'cam') ? 'Gal' : 'Cam';
            const otherBtn = document.getElementById(labelId.replace(type.charAt(0).toUpperCase() + type.slice(1), otherType));
            if (otherBtn) otherBtn.style.display = 'none';
            
            saveDraft();
          } else { throw new Error(result.error); }
        } catch (e) {
          alert("업로드 실패: " + e.message);
          label.innerText = "❌ 다시 시도";
          label.classList.remove('uploading');
        }
      }

      window.onload = async () => {
        initTimeOptions(); initSelects();
        const todayStr = new Date().toISOString().split('T')[0];
        flatpickr("#workDate", { locale: "ko", defaultDate: "today", onChange: () => { updateChecklist(); fetchWeather(document.getElementById('workDate').value); saveDraft(); } });
        loadDraft();
        if (document.querySelectorAll('#checklistItems li').length === 0) updateChecklist();
        fetchWeather(document.getElementById('workDate').value || todayStr);
        initAutoSaveListeners();
        const savedTheme = localStorage.getItem('4d_theme') || 'dark';
        if (savedTheme === 'light') { document.body.classList.remove('dark-mode'); document.getElementById('themeToggleBtn').innerText = '🌙'; }
      };

      async function fetchWeather(targetDate) {
        const weatherText = document.getElementById('weatherInfoText');
        try {
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=36.103&longitude=128.416&start_date=${targetDate}&end_date=${targetDate}&hourly=temperature_2m,relative_humidity_2m,weather_code&timezone=Asia/Seoul`);
          const d = await res.json();
          if (d.hourly) {
            const temp = d.hourly.temperature_2m[12], hum = d.hourly.relative_humidity_2m[12], code = d.hourly.weather_code[12];
            const c = { 0:'맑음', 1:'대체로맑음', 2:'구름조금', 3:'흐림', 61:'약한비', 63:'비', 95:'뇌우' };
            weatherText.innerText = `기상: ${c[code] || '흐림'} (${temp}°C, 습도 ${hum}%)`;
          }
        } catch (e) { weatherText.innerText = "📍 기상 정보 연동 실패"; }
      }

      function updateChecklist() {
        const list = document.getElementById('checklistItems'); if (!list) return;
        if (localStorage.getItem('4d_draft') && list.children.length > 0) return;
        list.innerHTML = '';
        const b = document.getElementById('buildingSelect').value, dt = document.getElementById('workDate').value;
        if (!dt) return;
        const d = new Date(dt), day = ["일","월","화","수","목","금","토"][d.getDay()];
        const weekStr = ["","첫째","둘째","셋째","넷째","다섯째"][Math.ceil((d.getDate() + new Date(d.getFullYear(), d.getMonth(), 1).getDay()) / 7)];
        let tasks = "";
        const ev = globalRules.eventRules.find(r => r.building === b && r.date === dt);
        const mo = globalRules.monthlyRules.find(r => r.building === b && r.weekOrder === weekStr && r.weekday === day);
        const de = globalRules.defaultRules.find(r => r.building === b && r.weekday === day);
        tasks = (ev ? ev.tasks : (mo ? mo.tasks : (de ? de.tasks : "")));
        if (tasks) tasks.split('\n').filter(t => t.trim()).forEach(t => addChecklistItem(t.trim(), false, false));
        else list.innerHTML = `<li class="no-items-placeholder" style="color:var(--text-muted); padding:10px; border:1px dashed var(--border-color); border-radius:8px; text-align:center; font-size:0.8rem;">등록된 규칙 없음</li>`;
        saveDraft();
      }

      function addChecklistItem(text, isDel, isChk) {
        const li = document.createElement('li'); li.className = "checklist-item";
        li.innerHTML = `<input type="checkbox" ${isChk ? 'checked' : ''} onchange="saveDraft()"><span data-task="${text.replace(/\[현장추가\]\s*/, '')}">${text}</span>${isDel ? `<button type="button" class="btn-del-item" onclick="this.parentElement.remove(); saveDraft();">삭제</button>` : ''}`;
        document.getElementById('checklistItems').appendChild(li);
      }

      window.checkAllItems = function(isCheck) { document.querySelectorAll('#checklistItems input[type="checkbox"]').forEach(cb => cb.checked = isCheck); saveDraft(); };

      document.getElementById('addCustomItemBtn').onclick = () => {
        const i = document.getElementById('customItemInput');
        if (i.value.trim()) { 
          const emptyMsg = document.querySelector('.no-items-placeholder'); if (emptyMsg) emptyMsg.remove();
          addChecklistItem("[현장추가] " + i.value.trim(), true, true); i.value = ''; saveDraft();
        }
      };

      document.getElementById('addFieldPhotoBtn').onclick = () => { extraPhotoCount++; addExtraPhotoRow(extraPhotoCount); saveDraft(); };

      function addExtraPhotoRow(id) {
        const div = document.createElement('div'); div.className = 'extra-photo-row'; div.id = `row_extra_${id}`;
        const items = Array.from(document.querySelectorAll('#checklistItems span[data-task]')).map(span => span.getAttribute('data-task'));
        let taskBtns = `<div class="task-tabs">`;
        items.forEach((item, index) => { taskBtns += `<label><input type="radio" name="task_${id}" value="${item}" onchange="handleTaskSelect(${id})" ${index === 0 ? 'checked' : ''}><span>${item}</span></label>`; });
        taskBtns += `<label><input type="radio" name="task_${id}" value="custom" onchange="handleTaskSelect(${id})" ${items.length === 0 ? 'checked' : ''}><span>✍️ 추가입력</span></label></div>`;

        div.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><span style="font-size:0.75rem; color:var(--primary); font-weight:bold;">📸 작업 사진 #${id}</span><button type="button" onclick="document.getElementById('row_extra_${id}').remove(); delete uploadedPhotos['extra_${id}']; saveDraft();" style="background:none; border:none; color:var(--danger); font-size:0.75rem;">삭제</button></div>
          ${taskBtns}<input type="text" id="custom_task_${id}" placeholder="추가 항목 내용 입력" style="display:none; margin-bottom: 12px; background:var(--bg-main);">
          <div class="status-tabs"><label><input type="radio" name="status_${id}" value="작업전"><span>작업전</span></label><label><input type="radio" name="status_${id}" value="작업중" checked><span>작업중</span></label><label><input type="radio" name="status_${id}" value="작업후"><span>작업후</span></label><label><input type="radio" name="status_${id}" value="현장사진"><span>현장사진</span></label></div>
          <div class="photo-btn-group">
            <input type="file" id="file_extra_${id}_cam" accept="image/*" capture="environment" style="display:none;" onchange="handleImmediateUpload(this, 'label_file_extra_${id}_cam', 'cam', 'extra_${id}')">
            <label id="label_file_extra_${id}_cam" class="photo-btn-label" onclick="document.getElementById('file_extra_${id}_cam').click()">📸 사진촬영</label>
            <input type="file" id="file_extra_${id}_gal" accept="image/*" style="display:none;" onchange="handleImmediateUpload(this, 'label_file_extra_${id}_gal', 'gal', 'extra_${id}')">
            <label id="label_file_extra_${id}_gal" class="photo-btn-label photo-btn-label-alt" onclick="document.getElementById('file_extra_${id}_gal').click()">🖼️ 사진첨부</label>
          </div>
        `;
        document.getElementById('fieldPhotos').appendChild(div);
        handleTaskSelect(id);
      }

      window.handleTaskSelect = function(id) {
        const checkedRadio = document.querySelector(`input[name="task_${id}"]:checked`);
        const customInput = document.getElementById(`custom_task_${id}`);
        if (checkedRadio && checkedRadio.value === 'custom') { customInput.style.display = 'block'; customInput.focus(); } else { customInput.style.display = 'none'; }
      };

      function initTimeOptions() {
        const startH = document.getElementById('startHour'), endH = document.getElementById('endHour');
        const range = isExpanded ? {start: 0, end: 23} : {start: 6, end: 20};
        startH.innerHTML = ''; endH.innerHTML = '';
        for(let i=range.start; i<=range.end; i++) {
          const v = i.toString().padStart(2, '0');
          startH.innerHTML += `<option value="${v}">${v}시</option>`; endH.innerHTML += `<option value="${v}">${v}시</option>`;
        }
      }

      function syncEndTime() {
        const h = parseInt(document.getElementById('startHour').value);
        let eh = h + 1; if (eh > (isExpanded ? 23 : 20)) eh = (isExpanded ? 23 : 20);
        document.getElementById('endHour').value = eh.toString().padStart(2, '0');
        document.getElementById('endMin').value = document.getElementById('startMin').value;
        saveDraft();
      }

      function initSelects() {
        const ts = document.getElementById('interiorTemp'), hs = document.getElementById('interiorHumidity');
        ts.innerHTML = '<option value="">미선택</option>'; hs.innerHTML = '<option value="">미선택</option>';
        for(let i=10; i<=40; i++) ts.innerHTML += `<option value="${i}">${i}°C</option>`;
        for(let i=0; i<=100; i+=5) hs.innerHTML += `<option value="${i}">${i}%</option>`;
      }

      document.getElementById('btnExpandTime').onclick = function() { isExpanded = !isExpanded; this.innerText = isExpanded ? "시간 축소" : "시간 확장 (00~23시)"; initTimeOptions(); syncEndTime(); };

      function renderSettingsUI() {
        const renderList = (id, type, arr) => { const l = document.getElementById(id); if(l) { l.innerHTML = ''; (arr || []).forEach(d => window.addRuleRow(type, d)); } };
        renderList('defaultRulesList', 'default', globalRules.defaultRules); renderList('monthlyRulesList', 'monthly', globalRules.monthlyRules); renderList('eventRulesList', 'event', globalRules.eventRules);
      }

      window.addRuleRow = function(type, data = {}) {
        const div = document.createElement('div'); div.className = 'rule-row'; div.style.background = "var(--bg-container)"; div.style.padding = "10px"; div.style.marginBottom = "10px"; div.style.borderRadius = "8px"; div.style.border = "1px solid var(--border-color)";
        div.innerHTML = `<div style="text-align: right;"><button type="button" onclick="this.parentElement.parentElement.remove()" style="background:var(--danger); color:white; border:none; padding:4px 8px; border-radius:4px; font-size:0.75rem;">삭제</button></div>
                        <select class="rule-building"><option value="백산빌딩" ${data.building==='백산빌딩'?'selected':''}>백산빌딩</option><option value="효성빌딩" ${data.building==='효성빌딩'?'selected':''}>효성빌딩</option></select>`;
        if(type === 'default') div.innerHTML += `<select class="rule-weekday">${['월','화','수','목','금','토','일'].map(d=>`<option value="${d}" ${data.weekday===d?'selected':''}>${d}요일</option>`).join('')}</select>`; 
        else if(type === 'monthly') div.innerHTML += `<select class="rule-weekorder">${['첫째','둘째','셋째','넷째','다섯째'].map(w=>`<option value="${w}" ${data.weekOrder===w?'selected':''}>${w} 주</option>`).join('')}</select><select class="rule-weekday">${['월','화','수','목','금','토','일'].map(d=>`<option value="${d}" ${data.weekday===d?'selected':''}>${d}요일</option>`).join('')}</select>`;
        else if(type === 'event') div.innerHTML += `<input type="text" class="rule-date" value="${data.date || ''}" readonly placeholder="날짜 선택">`; 
        div.innerHTML += `<textarea class="rule-tasks" placeholder="항목 입력 (엔터로 줄 구분)">${data.tasks || ''}</textarea>`;
        document.getElementById(`${type === 'event' ? 'event' : type}RulesList`).appendChild(div);
        if (type === 'event') flatpickr(div.querySelector('.rule-date'), { locale: "ko", dateFormat: "Y-m-d" });
      };

      document.getElementById('saveRulesToServerBtn').onclick = async () => {
        const collect = (id, type) => Array.from(document.getElementById(id).children).map(r => {
          const d = { building: r.querySelector('.rule-building').value, tasks: r.querySelector('.rule-tasks').value };
          if(type === 'default') d.weekday = r.querySelector('.rule-weekday').value;
          if(type === 'monthly') { d.weekOrder = r.querySelector('.rule-weekorder').value; d.weekday = r.querySelector('.rule-weekday').value; }
          if(type === 'event') d.date = r.querySelector('.rule-date').value;
          return d;
        });
        globalRules = { defaultRules: collect('defaultRulesList', 'default'), monthlyRules: collect('monthlyRulesList', 'monthly'), eventRules: collect('eventRulesList', 'event') };
        localStorage.setItem('4d_rules_cache', JSON.stringify(globalRules));
        const overlay = document.getElementById('loadingOverlay'); overlay.style.display = 'flex';
        try { await fetchWithRetry(APP_SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({action:"SAVE_RULES", rules: globalRules}) }); alert("✅ 서버 저장 완료!"); updateChecklist(); } 
        catch (e) { alert("저장 실패: " + e.message); } finally { overlay.style.display = 'none'; }
      };

      document.getElementById('loadRulesFromServerBtn').onclick = async () => {
        const overlay = document.getElementById('loadingOverlay'); overlay.style.display = 'flex';
        try {
          const res = await fetchWithRetry(APP_SCRIPT_URL, { method:'POST', body: JSON.stringify({action:"GET_RULES"}), headers: { 'Content-Type': 'text/plain' } });
          const json = await res.json();
          if (json.status === "success" && json.data) { globalRules = json.data; localStorage.setItem('4d_rules_cache', JSON.stringify(globalRules)); renderSettingsUI(); updateChecklist(); alert("📥 서버 데이터 동기화 완료!"); }
          else alert("저장된 규칙이 없습니다.");
        } catch (e) { alert("불러오기 실패"); } finally { overlay.style.display = 'none'; }
      };

      const compressImage = (file) => {
        return new Promise((resolve) => {
          const reader = new FileReader(); reader.onload = e => {
            const img = new Image(); img.src = e.target.result; img.onload = () => {
              const canvas = document.createElement('canvas'); const maxWidth = 1920; let w = img.width, h = img.height;
              if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
              canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
              resolve(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
            };
          }; reader.readAsDataURL(file);
        });
      };

      document.getElementById('saveWorkBtn').onclick = async () => {
        const checklist = Array.from(document.querySelectorAll('#checklistItems li')).filter(li => !li.classList.contains('no-items-placeholder')).map(li => {
          const span = li.querySelector('span'), input = li.querySelector('input');
          return { item: span ? span.innerText : "", checked: input && input.checked ? "O" : "X" };
        });
        if (checklist.length === 0) { alert("⚠️ 작업 항목이 없습니다."); return; }
        
        const overlay = document.getElementById('loadingOverlay'); overlay.style.display = 'flex';
        try {
          const stH = document.getElementById('startHour').value, stM = document.getElementById('startMin').value;
          const etH = document.getElementById('endHour').value, etM = document.getElementById('endMin').value;
          let diffMin = (parseInt(etH)*60 + parseInt(etM)) - (parseInt(stH)*60 + parseInt(stM)); if (diffMin < 0) diffMin += 1440;
          
          const payload = {
            workDate: document.getElementById('workDate').value, startTime: `${stH}:${stM}`, endTime: `${etH}:${etM}`, workDuration: `${Math.floor(diffMin/60)}시간 ${diffMin%60}분`,
            building: document.getElementById('buildingSelect').value, worker: document.getElementById('workerName').value,
            weather: document.getElementById('weatherInfoText').innerText, interiorTemp: document.getElementById('interiorTemp').value,
            interiorHumid: document.getElementById('interiorHumidity').value, customerReq: document.getElementById('customerRequest').value,
            workMemo: document.getElementById('workMemo').value, yearMonthFolder: document.getElementById('workDate').value.substring(0,7).replace('-',''),
            checklist: checklist,
            photoUrls: Object.values(uploadedPhotos) // 이미 서버에 올라간 URL 목록 전송
          };

          await fetchWithRetry(APP_SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(payload) });
          localStorage.removeItem('4d_draft'); alert("✅ 일지 전송 성공!"); location.reload();
        } catch (e) { alert("❌ 에러: " + e.message); } finally { overlay.style.display = 'none'; }
      };

      function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t + '-tab').style.display = 'block';
        document.querySelector(`[data-tab="${t}"]`).classList.add('active');
      }

      document.getElementById('themeToggleBtn').onclick = function() {
        const isDark = document.body.classList.toggle('dark-mode'); this.innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('4d_theme', isDark ? 'dark' : 'light');
      };
    </script>
  </body>
</html>
