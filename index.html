<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>4D클린 현장 일지 (Master-Sync)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <style>
      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --danger: #ef4444;
        --bg-main: #f8fafc;
        --bg-container: #ffffff;
        --bg-card: #f1f5f9;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
        --input-bg: #ffffff;
        --weather-available: #eab308; /* 더 선명한 황금색으로 조정 */
      }
      body.dark-mode {
        --bg-main: #0f172a;
        --bg-container: #1e293b;
        --bg-card: #334155;
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
        --border-color: #475569;
        --input-bg: #1e293b;
        --weather-available: #facc15; /* 다크모드용 밝은 노랑 */
      }
      body { font-family: sans-serif; background: var(--bg-main); margin: 0; padding: 10px; padding-bottom: 80px; color: var(--text-main); transition: all 0.3s ease; }
      .container { max-width: 600px; margin: 0 auto; background: var(--bg-container); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
      .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
      .tab-btn { flex: 1; padding: 12px; border: none; background: var(--bg-card); color: var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: bold; }
      .tab-btn.active { background: var(--primary); color: white; }
      .card { border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; background: var(--bg-container); }
      .card h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px; }
      label { display: block; font-size: 0.8rem; font-weight: bold; color: var(--text-muted); margin-bottom: 4px; }
      input, select, textarea { width: 100%; padding: 10px 8px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-main); margin-top: 4px; box-sizing: border-box; font-size: 0.95rem; }
      
      /* [중요] Flatpickr 날짜 색상 강제 지정 - 우선순위 확보 */
      .flatpickr-day.available-day { 
        color: var(--weather-available) !important; 
        font-weight: 900 !important; 
        border-bottom: 3px solid var(--weather-available) !important;
        text-shadow: 0px 1px 2px rgba(0,0,0,0.1) !important;
      }

      /* 선택된 날짜일 때는 텍스트를 흰색으로 (가독성 보호) */
      .flatpickr-day.selected.available-day {
        color: #ffffff !important;
        border-bottom-color: transparent !important;
      }

      .dark-mode .flatpickr-calendar { background: #1e293b; color: #fff; border: 1px solid #475569; }
      .dark-mode .flatpickr-day { color: #cbd5e1; }
      .dark-mode .flatpickr-day.selected { background: var(--primary); color: white !important; }

      .time-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
      .time-box { background: var(--bg-card); padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border-color); }
      .time-box label { font-size: 0.75rem; color: var(--text-muted); }
      .time-box div { display: flex; gap: 4px; margin-top: 5px; }
      .time-box select { flex: 1; padding: 8px 4px; font-size: 0.85rem; min-width: 0; text-align: center; }

      .bottom-fixed-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px; background: var(--bg-container); border-top: 1px solid var(--border-color); display: flex; justify-content: center; z-index: 100; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); }
      .save-work-btn-large { width: 100%; max-width: 600px; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
      
      .checklist-item { display: flex; align-items: center; gap: 10px; background: var(--bg-card); padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border-color); }
      .checklist-item input[type="checkbox"] { width: 22px; height: 22px; flex-shrink: 0; }
      .checklist-item span { flex: 1; font-size: 0.9rem; }
      
      .weather-badge { font-size: 0.8rem; color: #fff; margin-bottom: 12px; background: var(--primary); padding: 8px 14px; border-radius: 10px; display: inline-block; font-weight: bold; box-shadow: 0 2px 5px rgba(99, 102, 241, 0.3); }
    </style>
  </head>
  <body class="dark-mode">
    <main class="container">
      <div class="app-header">
        <h1 style="font-size: 1.3rem; margin:0;">4D클린 현장 일지</h1>
        <button id="themeToggleBtn" type="button" style="background:none; border:none; font-size: 1.5rem; cursor:pointer;">☀️</button>
      </div>

      <div class="tabs" style="display:flex; gap:8px; margin-bottom:15px;">
        <button class="tab-btn active" data-tab="main" onclick="switchTab('main')">작업 기록</button>
        <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">규칙 설정</button>
      </div>

      <div id="main-tab" class="tab-content active">
        <section class="card">
          <h2>1) 작업 기본 정보</h2>
          <div id="weatherInfoText" class="weather-badge">📍 기상 데이터 로딩 중...</div>
          <div style="font-size: 10px; color: var(--weather-available); margin-bottom: 10px; font-weight: bold;">* 노란색 날짜: 날씨 조회가 가능한 날</div>
          
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <label>작업 날짜 <input id="workDate" type="text" placeholder="날짜 선택"></label>
            <label>현장 작업자 <select id="workerName"><option value="이영준">이영준</option><option value="조혜진">조혜진</option></select></label>
          </div>
          <label style="margin-top:10px;">대상 건물 <select id="buildingSelect" onchange="updateChecklist()"><option value="백산빌딩">백산빌딩</option><option value="효성빌딩">효성빌딩</option></select></label>
          
          <div class="time-select-grid">
            <div class="time-box">
              <label>시작 시간</label>
              <div style="display:flex; gap:4px; margin-top:5px;">
                <select id="startHour" onchange="syncEndTime()"></select>
                <select id="startMin" onchange="syncEndTime()"><option value="00">00분</option><option value="30">30분</option></select>
              </div>
            </div>
            <div class="time-box">
              <label>종료 시간</label>
              <div style="display:flex; gap:4px; margin-top:5px;">
                <select id="endHour"></select>
                <select id="endMin"><option value="00">00분</option><option value="30">30분</option></select>
              </div>
            </div>
          </div>
          <button type="button" id="btnExpandTime" style="margin-top:10px; width:100%; padding:8px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:6px; cursor:pointer; font-size:0.8rem; color:var(--text-main);">시간 확장 (00~23시)</button>
        </section>

        <section class="card">
          <h2 style="border-bottom:none; margin-bottom:4px;">2) 오늘의 청소 체크리스트</h2>
          <ul id="checklistItems" style="list-style:none; padding:0;"></ul>
          <div style="display:flex; gap:6px; margin-top:10px; align-items: center;">
            <input type="text" id="customItemInput" placeholder="현장 추가 항목" style="margin:0; flex: 1; min-width: 0;">
            <button id="addCustomItemBtn" type="button" style="background:var(--primary); color:white; border:none; padding:0 15px; height: 42px; border-radius:6px; font-weight:bold; white-space: nowrap; flex-shrink: 0;">추가</button>
          </div>
        </section>

        <section class="card">
          <h2>3) 환경 데이터</h2>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;">
             <label>내부 온도 <select id="interiorTemp"></select></label>
             <label>내부 습도 <select id="interiorHumidity"></select></label>
          </div>
          <button type="button" class="save-work-btn-large" style="background:#10b981; margin-bottom:10px;">📸 작업 사진 촬영</button>
        </section>
      </div>

      <div id="settings-tab" class="tab-content" style="display:none;">
        <section class="card">
          <h2 style="color:var(--primary);">서버 동기화 설정</h2>
          <button type="button" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">🌐 서버에 규칙 저장</button>
        </section>
      </div>
    </main>

    <div class="bottom-fixed-bar">
      <button id="saveWorkBtn" class="save-work-btn-large">작업 일지 전송</button>
    </div>

    <script>
      let isExpanded = false;

      // 1. 날짜 가용성 판정 로직 (오늘 기준 전후 14일)
      const isAvailableDate = (date) => {
        if (!date) return false;
        const today = new Date();
        today.setHours(0,0,0,0);
        const target = new Date(date);
        target.setHours(0,0,0,0);
        const diff = Math.abs(target - today) / (1000 * 60 * 60 * 24);
        return diff <= 14; 
      };

      window.onload = async () => {
        initTimeOptions();
        initSelects();
        
        // [중요] Flatpickr 설정 - 클래스 주입 방식 강화
        flatpickr("#workDate", { 
          locale: "ko", 
          defaultDate: "today",
          disableMobile: "true", // 모바일 기본 UI 대신 커스텀 UI 강제 사용 (스타일 적용을 위해)
          onDayCreate: (dObj, dStr, fp, dayElem) => {
            // 날짜 생성 시점에 가용성 체크 후 클래스 추가
            if (isAvailableDate(dayElem.dateObj)) {
              dayElem.classList.add("available-day"); 
            }
          },
          onChange: (selectedDates, dateStr) => { 
            updateChecklist(); 
            fetchWeather(dateStr); 
          } 
        });

        updateChecklist();
        fetchWeather(new Date().toISOString().split('T')[0]);
      };

      // 2. 날씨 데이터 동기화
      async function fetchWeather(targetDate) {
        const weatherText = document.getElementById('weatherInfoText');
        weatherText.innerText = `📍 ${targetDate} 조회 중...`;
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
          try {
            const { latitude, longitude } = pos.coords;
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&start_date=${targetDate}&end_date=${targetDate}&hourly=temperature_2m,weather_code&timezone=Asia/Seoul`);
            const d = await res.json();
            
            const temp = d.hourly.temperature_2m[12];
            const code = d.hourly.weather_code[12];
            const conditionMap = { 0:'맑음', 1:'맑음', 2:'흐림', 3:'흐림', 61:'비', 63:'비', 71:'눈' };
            
            weatherText.innerText = `기상: ${conditionMap[code] || '보통'} (${temp}°C)`;
            weatherText.style.background = (code >= 61) ? '#ef4444' : 'var(--primary)';
          } catch (e) { 
            weatherText.innerText = "📍 기상 정보 없음"; 
          }
        }, () => { 
            weatherText.innerText = "📍 위치 권한 필요"; 
        });
      }

      // 나머지 유틸리티 함수들
      document.getElementById('themeToggleBtn').onclick = () => {
        const isDark = document.body.classList.toggle('dark-mode');
        document.getElementById('themeToggleBtn').innerText = isDark ? '☀️' : '🌙';
      };

      function initTimeOptions() {
        const startH = document.getElementById('startHour'), endH = document.getElementById('endHour');
        const range = isExpanded ? {start: 0, end: 23} : {start: 6, end: 20};
        startH.innerHTML = ''; endH.innerHTML = '';
        for(let i=range.start; i<=range.end; i++) {
          const v = i.toString().padStart(2, '0');
          startH.innerHTML += `<option value="${v}">${v}시</option>`;
          endH.innerHTML += `<option value="${v}">${v}시</option>`;
        }
        startH.value = "06"; syncEndTime();
      }

      function syncEndTime() {
        const h = parseInt(document.getElementById('startHour').value);
        document.getElementById('endHour').value = (h + 1).toString().padStart(2, '0');
      }

      document.getElementById('btnExpandTime').onclick = function() {
        isExpanded = !isExpanded;
        this.innerText = isExpanded ? "시간 축소" : "시간 확장";
        initTimeOptions();
      };

      function initSelects() {
        const ts = document.getElementById('interiorTemp'), hs = document.getElementById('interiorHumidity');
        for(let i=15; i<=35; i++) ts.innerHTML += `<option value="${i}">${i}°C</option>`;
        for(let i=20; i<=80; i+=10) hs.innerHTML += `<option value="${i}">${i}%</option>`;
        ts.value = "22"; hs.value = "40";
      }

      function updateChecklist() {
        const list = document.getElementById('checklistItems');
        list.innerHTML = `
          <li class="checklist-item"><input type="checkbox"><span>바닥 건식/습식 청소</span></li>
          <li class="checklist-item"><input type="checkbox"><span>공용부 집기 먼지 제거</span></li>
          <li class="checklist-item"><input type="checkbox"><span>쓰레기 분리 배출</span></li>
        `;
      }

      function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t + '-tab').style.display = 'block';
        document.querySelector(`[data-tab="${t}"]`).classList.add('active');
      }
    </script>
  </body>
</html>
